<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduQuiz AI Blue v10.0 Zero-Firebase</title>

    <!-- 필수 라이브러리 (파이어베이스 제외) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f9ff; -webkit-tap-highlight-color: transparent; }
        .blue-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 🧠 순수 AI & GitHub 설정 (Firebase 로직 0%) ---
        const geminiApiKey = "AIzaSyALNeGgRQZz1Z1D1aNW_RX0ZHHg1_pPtlM";
        const GITHUB_REPO = "haha1590/nursing-study"; 

        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [view, setView] = useState('landing');
            const [status, setStatus] = useState(null);
            const [units, setUnits] = useState([]); 
            const [loading, setLoading] = useState(false);
            const [selectedUnit, setSelectedUnit] = useState(null);
            const [currentQuestions, setCurrentQuestions] = useState([]);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [quizResults, setQuizResults] = useState(null);
            const [startTime, setStartTime] = useState(null);

            // 앱 시작 시 깃허브 목록만 가져옵니다.
            useEffect(() => {
                fetchGithubFiles();
            }, []);

            const fetchGithubFiles = async () => {
                try {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/`);
                    const data = await response.json();
                    const htmlFiles = data
                        .filter(file => file.name.endsWith('.html') && file.name !== 'index.html')
                        .map(file => ({
                            id: file.sha,
                            title: file.name.replace('.html', ''),
                            path: file.path,
                            rawUrl: `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${file.path}`
                        }));
                    setUnits(htmlFiles);
                } catch (err) {
                    setStatus({ type: 'error', text: "깃허브 저장소를 찾을 수 없습니다." });
                }
            };

            // AI 호출 엔진: 오직 정식 v1 주소만 사용하여 충돌 방지
            const callGeminiAI = async (prompt) => {
                const apiURL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${geminiApiKey}`;
                
                const response = await fetch(apiURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || "AI 서버 응답 오류");
                return data.candidates[0].content.parts[0].text;
            };

            const generateQuiz = async () => {
                if (!selectedUnit) return;
                
                setLoading(true);
                setStatus({ type: 'info', text: "AI가 단원을 읽고 문제를 만드는 중..." });

                try {
                    // 1. 깃허브에서 자료 가져오기
                    let textResponse = await fetch(selectedUnit.rawUrl);
                    if (!textResponse.ok) textResponse = await fetch(selectedUnit.rawUrl.replace('/main/', '/master/'));
                    const rawHTML = await textResponse.text();
                    
                    // 2. 텍스트에서 불필요한 태그 제거
                    const tempDiv = document.createElement("div");
                    tempDiv.innerHTML = rawHTML;
                    const cleanText = (tempDiv.textContent || tempDiv.innerText || "").replace(/\s+/g, ' ').trim().substring(0, 8000);

                    // 3. AI에게 퀴즈 요청 (가장 확실한 포맷)
                    const prompt = `보건간호과 선생님입니다. 다음 자료를 바탕으로 5지선다형 퀴즈 5개를 만드세요. 반드시 순수한 JSON 배열 형식으로만 응답하고 다른 설명은 하지 마세요.
                    형식: [{"id":1,"question":"질문","options":["1","2","3","4","5"],"correctAnswer":0,"explanation":"해설"}]
                    
[자료]
${cleanText}`;

                    const aiText = await callGeminiAI(prompt);

                    // 4. JSON 데이터만 정밀 추출
                    const jsonStart = aiText.indexOf('[');
                    const jsonEnd = aiText.lastIndexOf(']') + 1;
                    if (jsonStart === -1) throw new Error("데이터 형식이 올바르지 않습니다.");
                    
                    const parsed = JSON.parse(aiText.substring(jsonStart, jsonEnd));
                    setCurrentQuestions(parsed);
                    setCurrentQuestionIndex(0); 
                    setAnswers({}); 
                    setView('quiz'); 
                    setStartTime(Date.now()); 
                    setStatus(null);
                } catch (err) { 
                    console.error(err);
                    setStatus({ type: 'error', text: `죄송합니다. 서버 지연으로 실패했습니다. 다시 한번 눌러주세요!` }); 
                } finally { setLoading(false); }
            };

            const Header = () => (
                <header className="bg-white/80 backdrop-blur-md border-b border-blue-50 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shrink-0 shadow-sm">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setView('landing'); setStatus(null); }}>
                        <div className="bg-blue-500 p-2 rounded-2xl text-white shadow-lg"><Icon name="shield-check" size={20} /></div>
                        <h1 className="text-lg font-black text-blue-600 tracking-tighter italic">EduQuiz <span className="text-teal-400 not-italic uppercase text-[10px]">v10.0 Pure</span></h1>
                    </div>
                    {status && (
                        <div className={`fixed top-20 left-1/2 -translate-x-1/2 w-[90%] max-w-xs px-6 py-3 rounded-full shadow-2xl font-bold text-[10px] z-[200] animate-bounce border-2 ${status.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-500' : 'bg-blue-50 border-blue-200 text-blue-500'}`}>
                            {status.text}
                            <button onClick={() => setStatus(null)} className="ml-2 font-black opacity-30">×</button>
                        </div>
                    )}
                </header>
            );

            if (view === 'landing') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                    <div className="bg-white p-12 rounded-[5rem] shadow-2xl border-8 border-blue-50 w-full max-w-sm relative overflow-hidden animate-fadeIn">
                        <div className="bg-blue-500 w-24 h-24 rounded-[3rem] flex items-center justify-center mx-auto mb-10 text-white shadow-xl shadow-blue-100">
                            <Icon name="github" size={48} />
                        </div>
                        <h2 className="text-4xl font-black mb-4 text-slate-800 leading-tight tracking-tighter">간호의 기초<br/><span className="bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-teal-400">GitHub AI 퀴즈</span></h2>
                        <p className="text-slate-400 font-bold mb-14 text-[10px] tracking-[0.3em] uppercase italic opacity-70 leading-none">Zero-Firebase v10.0 ✨</p>
                        <button onClick={() => setView('student_setup')} className="w-full blue-gradient p-7 rounded-[2.5rem] text-white font-black flex items-center justify-center gap-4 transition-all shadow-xl shadow-blue-100 active:scale-95">
                            <Icon name="play" fill="currentColor" size={20} /> 학습 시작하기
                        </button>
                    </div>
                </div>
            );

            if (view === 'student_setup') return (
                <div className="min-h-screen flex flex-col items-center">
                    <Header />
                    <main className="max-w-xl w-full p-6 space-y-10 animate-fadeIn">
                        <div className="bg-white rounded-[4rem] p-10 shadow-2xl border-8 border-white space-y-8 text-center">
                            <h2 className="text-3xl font-black text-slate-700 italic tracking-tighter leading-none">GitHub Library ✨</h2>
                            <section className="text-left space-y-4">
                                <h4 className="text-[12px] font-black text-blue-500 uppercase tracking-widest flex items-center gap-2 px-1"><Icon name="list" size={16} /> 학습할 단원을 선택하세요</h4>
                                <div className="grid gap-2 max-h-80 overflow-y-auto custom-scrollbar pr-1">
                                    {units.length === 0 ? (
                                        <div className="text-center py-20 text-slate-300 font-bold italic">자료를 불러오는 중입니다...</div>
                                    ) : units.map(u => (
                                        <button key={u.id} onClick={() => setSelectedUnit(u)} className={`text-left px-7 py-6 rounded-[2.5rem] border-4 transition-all font-bold flex items-center justify-between group ${selectedUnit?.id === u.id ? 'border-blue-300 bg-blue-50 text-blue-600 shadow-lg' : 'border-slate-50 bg-slate-50/50 hover:border-pink-100 shadow-sm'}`}>
                                            <span className="text-[15px]">{u.title}</span>
                                            {selectedUnit?.id === u.id && <Icon name="check-circle" className="text-blue-500" size={20}/>}
                                        </button>
                                    ))}
                                </div>
                            </section>
                            <button onClick={generateQuiz} disabled={!selectedUnit || loading} className={`w-full py-8 rounded-[2.8rem] font-black text-xl shadow-2xl transition-all ${loading ? 'bg-slate-100 text-slate-300' : 'blue-gradient text-white active:scale-95 shadow-blue-100'}`}>
                                {loading ? 'AI 분석 중...' : '퀴즈 생성 & 시작 ✨'}
                            </button>
                        </div>
                    </main>
                </div>
            );

            if (view === 'quiz') {
                const q = currentQuestions[currentQuestionIndex];
                if (!q) return null;
                return (
                    <div className="h-screen flex flex-col bg-white overflow-hidden text-left animate-fadeIn">
                        <header className="px-6 py-5 flex items-center justify-between border-b border-blue-50 shrink-0">
                            <button onClick={() => setView('student_setup')} className="text-slate-300 p-2"><Icon name="x" size={28}/></button>
                            <span className="font-black text-blue-500 text-lg tracking-widest italic">{currentQuestionIndex + 1} / {currentQuestions.length}</span>
                            <div className="px-4 py-1.5 bg-blue-500 text-white rounded-full text-[10px] font-black">{Math.floor((Date.now() - startTime)/1000)}s</div>
                        </header>
                        <main className="flex-1 p-8 flex flex-col items-center justify-center space-y-12 overflow-y-auto">
                            <h2 className="text-2xl font-black text-slate-700 text-center leading-snug max-w-lg">{q.question}</h2>
                            <div className="w-full max-w-lg space-y-4">
                                {q.options.map((opt, i) => (
                                    <button key={i} onClick={() => setAnswers({...answers, [currentQuestionIndex]: i})} className={`w-full text-left p-7 rounded-[2.8rem] border-4 transition-all font-bold text-lg flex items-center gap-6 ${answers[currentQuestionIndex] === i ? 'border-blue-400 bg-blue-50 text-blue-600 shadow-md' : 'border-slate-50 bg-slate-50 hover:border-blue-100 shadow-sm'}`}>
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center shrink-0 ${answers[currentQuestionIndex] === i ? 'bg-blue-500 text-white shadow-md' : 'bg-slate-700 text-white'}`}>{i + 1}</div>
                                        <span className="leading-tight text-left">{opt}</span>
                                    </button>
                                ))}
                            </div>
                        </main>
                        <footer className="p-8 border-t border-blue-50 bg-white shrink-0 text-center flex flex-col items-center">
                            <div className="max-w-lg w-full flex gap-4">
                                <button disabled={currentQuestionIndex === 0} onClick={() => setCurrentQuestionIndex(p => p - 1)} className="flex-1 py-6 bg-slate-50 text-slate-300 font-bold rounded-3xl text-sm">이전</button>
                                {currentQuestionIndex === currentQuestions.length - 1 ? 
                                    <button onClick={() => { const s = currentQuestions.filter((q, i) => answers[i] === q.correctAnswer).length; setQuizResults({ score: s, total: currentQuestions.length, percentage: Math.round((s/currentQuestions.length)*100) }); setView('result'); }} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2] blue-gradient text-white py-6 rounded-3xl font-black text-xl shadow-lg active:scale-95">결과 확인</button> :
                                    <button onClick={() => setCurrentQuestionIndex(p => p + 1)} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2] bg-slate-800 text-white py-6 rounded-3xl font-black text-xl active:scale-95">다음 문제</button>
                                }
                            </div>
                        </footer>
                    </div>
                );
            }

            if (view === 'result') return (
                <div className="min-h-screen bg-blue-50 flex flex-col items-center text-center">
                    <Header />
                    <main className="w-full max-w-md p-6 space-y-6 overflow-y-auto pb-24 text-center flex flex-col items-center animate-fadeIn">
                        <div className="bg-white rounded-[5rem] shadow-2xl p-12 text-center border-8 border-white w-full">
                            <div className="bg-yellow-400 w-24 h-24 rounded-[3rem] flex items-center justify-center mx-auto mb-8 text-white shadow-xl animate-bounce shadow-yellow-100"><Icon name="award" size={50} /></div>
                            <h2 className="text-8xl font-black mb-3 text-slate-800 tracking-tighter text-center">{quizResults?.percentage}%</h2>
                            <p className="font-black text-blue-500 text-xl mb-12 text-center">참 잘했어요! ✨</p>
                            <div className="space-y-6 text-left mb-12 border-t border-blue-50 pt-10">
                                {currentQuestions.map((q, i) => (
                                    <div key={i} className={`p-8 rounded-[3rem] border-2 ${answers[i] === q.correctAnswer ? 'border-emerald-100 bg-emerald-50/20' : 'border-rose-100 bg-rose-50/20'}`}>
                                        <p className="font-bold text-slate-700 mb-4 leading-snug text-left">{i+1}. {q.question}</p>
                                        <p className="text-[11px] text-slate-400 leading-relaxed italic border-t border-white/50 pt-3 mt-3 text-left">{q.explanation}</p>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setView('landing')} className="w-full bg-slate-800 text-white py-7 rounded-[2.5rem] font-black text-xl shadow-xl active:scale-95 text-center">메인으로</button>
                        </div>
                    </main>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
