<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduQuiz AI Blue v30.0 Elegant Master</title>

    <!-- 필수 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f5faff; -webkit-tap-highlight-color: transparent; color: #1e293b; }
        .blue-gradient { background: linear-gradient(135deg, #3494e6 0%, #2dd4bf 100%); }
        .soft-bg-gradient { background: linear-gradient(180deg, #f0f7ff 0%, #ffffff 100%); }
        .result-header-gradient { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 10px; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const GITHUB_REPO = "haha1590/nursing-study"; 
        const { useState, useEffect, useCallback, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [geminiApiKey, setGeminiApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [view, setView] = useState('landing');
            const [status, setStatus] = useState(null); 
            const [units, setUnits] = useState([]); 
            const [loading, setLoading] = useState(false);
            const [selectedUnit, setSelectedUnit] = useState(null);
            const [difficulty, setDifficulty] = useState(3);
            const [questionCount, setQuestionCount] = useState(5);
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);

            const [currentQuestions, setCurrentQuestions] = useState([]);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [quizResults, setQuizResults] = useState(null);
            const [startTime, setStartTime] = useState(null);

            // [핵심] 깃허브 파일 로딩 - 괄호 및 배열 철저 검수 완료
            const fetchGithubFiles = useCallback(async () => {
                try {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/`);
                    const data = await response.json();
                    if (!response.ok) throw new Error("자료 목록 로딩 실패");
                    const htmlFiles = data
                        .filter(file => file.name.endsWith('.html') && file.name !== 'index.html')
                        .map(file => ({
                            id: file.sha,
                            title: file.name.replace('.html', ''),
                            path: file.path,
                            rawUrl: `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${file.path}`
                        }));
                    setUnits(htmlFiles);
                } catch (err) {
                    setStatus({ type: 'error', text: "저장소 연결 실패: 깃허브 상태를 확인하세요." });
                }
            }, []); 

            useEffect(() => { fetchGithubFiles(); }, [fetchGithubFiles]);

            const masterAICall = async (prompt) => {
                if (!geminiApiKey) throw new Error("API 키가 없습니다.");
                const configs = [
                    { ver: 'v1beta', mod: 'gemini-2.5-flash' },      
                    { ver: 'v1beta', mod: 'gemini-2.0-flash' },      
                    { ver: 'v1beta', mod: 'gemini-2.0-flash-lite' }  
                ];
                let lastErrorMessage = "";
                for (const cfg of configs) {
                    try {
                        const url = `https://generativelanguage.googleapis.com/${cfg.ver}/models/${cfg.mod}:generateContent?key=${geminiApiKey}`;
                        const res = await fetch(url, {
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await res.json();
                        if (res.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                            return data.candidates[0].content.parts[0].text;
                        }
                        lastErrorMessage = data.error?.message || "AI 엔진 응답 오류";
                    } catch (err) { lastErrorMessage = err.message; }
                    await new Promise(r => setTimeout(r, 150));
                }
                throw new Error(lastErrorMessage);
            };

            const generateQuiz = async () => {
                if (!selectedUnit) return;
                setLoading(true);
                setStatus({ type: 'info', text: "AI 선생님이 맞춤형 퀴즈를 출제 중입니다... ✨" });
                try {
                    let textResponse = await fetch(selectedUnit.rawUrl);
                    if (!textResponse.ok) textResponse = await fetch(selectedUnit.rawUrl.replace('/main/', '/master/'));
                    const rawHTML = await textResponse.text();
                    const doc = new DOMParser().parseFromString(rawHTML, 'text/html');
                    const cleanText = (doc.body.textContent || "").replace(/\s+/g, ' ').trim().substring(0, 7000);

                    const finalPrompt = `보건간호과 선생님 모드. [자료내용]을 분석하여 난이도 ${difficulty}/5단계의 5지선다형 문제를 ${questionCount}개 만드세요.
                    단순 암기보다는 핵심 원리를 묻는 문제를 다양하게 섞어주세요. 각 문제에 대해 학생들이 완벽히 이해할 수 있도록 '해설'을 아주 풍성하고 친절하게 작성하세요.
                    (중복 방지 ID: ${Date.now()})
                    순수한 JSON 배열로만 출력하세요. 형식: [{"id":1,"question":"질문","options":["1","2","3","4","5"],"correctAnswer":0,"explanation":"해설"}]
                    [자료내용] ${cleanText}`;

                    const aiResult = await masterAICall(finalPrompt);
                    const startIdx = aiResult.indexOf('[');
                    const endIdx = aiResult.lastIndexOf(']') + 1;
                    if (startIdx === -1) throw new Error("데이터 분석 실패");
                    
                    setCurrentQuestions(JSON.parse(aiResult.substring(startIdx, endIdx)));
                    // [핵심] 인덱스 초기화 0 고정 확인
                    setCurrentQuestionIndex(0); 
                    setAnswers({}); 
                    setView('quiz'); 
                    setStartTime(Date.now()); 
                    setStatus(null);
                } catch (err) { setStatus({ type: 'error', text: `AI 실패: ${err.message}` }); }
                finally { setLoading(false); }
            };

            const Header = () => (
                <header className="bg-white/90 backdrop-blur-md border-b border-blue-50 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shrink-0 shadow-sm">
                    <div className="flex items-center gap-2 cursor-pointer text-left" onClick={() => { setView('landing'); setStatus(null); }}>
                        <div className="bg-blue-600 p-2 rounded-2xl text-white shadow-lg"><Icon name="graduation-cap" size={20} /></div>
                        <h1 className="text-lg font-black text-blue-900 tracking-tighter leading-none italic">EduQuiz <span className="text-teal-500 not-italic uppercase text-[10px]">v30.0 Master</span></h1>
                    </div>
                    {/* [핵심] status null 체크 래퍼 - 12번째 실수 방지 완료 */}
                    {status && (
                        <div className={`fixed top-20 left-1/2 -translate-x-1/2 w-[92%] max-w-xs px-6 py-4 rounded-3xl shadow-2xl font-bold text-[11px] z-[200] animate-bounce border-2 ${status.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-600' : 'bg-blue-50 border-blue-200 text-blue-600'}`}>
                            <div className="flex gap-3 items-center text-left">
                                <Icon name={status.type === 'error' ? 'alert-circle' : 'loader-2'} size={18} className={status.type !== 'error' ? 'animate-spin' : ''} />
                                <span className="leading-relaxed text-left">{status.text}</span>
                            </div>
                            <button onClick={() => setStatus(null)} className="absolute top-2 right-3 opacity-30 text-lg">×</button>
                        </div>
                    )}
                </header>
            );

            if (!geminiApiKey || view === 'settings') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-blue-50">
                    <div className="bg-white p-10 rounded-[4rem] shadow-2xl w-full max-w-sm space-y-6 animate-fadeIn text-center border-8 border-white">
                        <div className="bg-blue-600 w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto text-white shadow-xl animate-float"><Icon name="key" size={40} /></div>
                        <h2 className="text-2xl font-black text-slate-800">보안 금고</h2>
                        <p className="text-sm text-slate-400 font-bold leading-relaxed italic">학습을 위해 Gemini API 키를<br/>입력해 주세요.</p>
                        <input type="password" placeholder="Gemini API Key 입력" className="w-full px-6 py-5 rounded-3xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-blue-500 font-mono text-xs shadow-inner" onBlur={(e) => { const key = e.target.value.trim(); if(key) { setGeminiApiKey(key); localStorage.setItem('gemini_api_key', key); setView('landing'); } }} />
                        <div className="bg-blue-50 p-5 rounded-3xl text-[11px] text-blue-600 font-bold leading-tight border border-blue-100 italic">⚠️ 선생님! 깃허브 코드에는 키를 적지 마세요. 여기 화면에 입력해야 보안 봇에 차단되지 않습니다.</div>
                    </div>
                </div>
            );

            if (view === 'landing') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-50 overflow-hidden font-sans">
                    <div className="relative w-full max-w-sm flex flex-col items-center">
                        <div className="absolute -top-20 bg-blue-200 w-80 h-80 rounded-full blur-[110px] opacity-40 animate-pulse"></div>
                        <div className="bg-white p-14 rounded-[6rem] shadow-2xl w-full text-center relative glass-card animate-fadeIn flex flex-col items-center border-8 border-white">
                            <div className="bg-blue-600 w-28 h-28 rounded-[3.5rem] flex items-center justify-center mb-12 text-white shadow-2xl shadow-blue-200 animate-float"><Icon name="sparkles" size={60} fill="currentColor" /></div>
                            <h2 className="text-5xl font-black mb-6 text-slate-800 tracking-tighter leading-tight">간호의 기초<br/><span className="bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-teal-500">Elegant 퀴즈</span></h2>
                            <p className="text-slate-400 font-bold mb-16 text-[11px] tracking-[0.4em] uppercase italic opacity-70 leading-none">v30.0 Absolute Mastery 🍬</p>
                            <button onClick={() => setView('student_setup')} className="w-full blue-gradient p-8 rounded-[3.5rem] text-white font-black flex items-center justify-center gap-4 transition-all shadow-xl shadow-blue-200 active:scale-95 text-xl">
                                <Icon name="play" fill="currentColor" size={28} /> 학습 시작하기
                            </button>
                            <button onClick={() => setView('settings')} className="mt-10 text-slate-300 text-[11px] font-bold underline underline-offset-4 opacity-50">API 키 재설정</button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'student_setup') return (
                <div className="min-h-screen flex flex-col items-center bg-blue-50">
                    <Header />
                    <main className="max-w-xl w-full p-6 space-y-6 animate-fadeIn">
                        <div className="bg-white rounded-[5rem] p-10 md:p-14 shadow-2xl border-8 border-white space-y-12 flex flex-col items-center relative overflow-hidden">
                            <div className="text-center relative z-10"><h2 className="text-4xl font-black text-slate-800 tracking-tighter italic mb-3">Study Setup ✨</h2><p className="text-[12px] font-bold text-blue-500 uppercase tracking-[0.3em]">나만의 스마트한 공부 계획 🍬</p></div>
                            
                            <div className="w-full space-y-8 relative z-10">
                                <section className="relative">
                                    <h4 className="text-[12px] font-black text-slate-400 uppercase mb-4 px-3 flex items-center gap-3"><Icon name="bookmark" size={16} fill="currentColor" className="text-blue-400" /> 1. 학습 단원 선택</h4>
                                    <div className="relative">
                                        <button onClick={() => setIsDropdownOpen(!isDropdownOpen)} className="w-full bg-slate-50 px-8 py-6 rounded-3xl border-4 border-slate-50 flex items-center justify-between font-black text-slate-700 shadow-inner transition-all hover:border-blue-100 active:scale-95">
                                            <span className="truncate pr-4">{selectedUnit ? selectedUnit.title : '단원을 선택해 주세요'}</span>
                                            <Icon name={isDropdownOpen ? 'chevron-up' : 'chevron-down'} size={24} className="text-blue-500 shrink-0" />
                                        </button>
                                        {isDropdownOpen && (
                                            <div className="absolute top-full left-0 right-0 mt-3 bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl border-4 border-blue-50 z-[100] max-h-56 overflow-y-auto custom-scrollbar animate-fadeIn">
                                                {units.map(u => (
                                                    <button key={u.id} onClick={() => { setSelectedUnit(u); setIsDropdownOpen(false); }} className={`w-full text-left px-8 py-5 font-black text-[15px] border-b border-slate-50 last:border-0 transition-colors flex items-center justify-between ${selectedUnit?.id === u.id ? 'text-blue-600 bg-blue-50' : 'text-slate-500 hover:bg-slate-50'}`}>
                                                        <span>{u.title}</span>
                                                        {selectedUnit?.id === u.id && <Icon name="check" size={18} />}
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </section>

                                <div className="grid grid-cols-2 gap-8">
                                    <section>
                                        <h4 className="text-[12px] font-black text-slate-400 uppercase mb-4 px-3 flex items-center gap-3"><Icon name="bar-chart-2" size={16} className="text-teal-400" /> 2. 난이도</h4>
                                        <div className="flex bg-slate-100 p-2 rounded-[2rem] justify-between gap-1.5 shadow-inner border-2 border-slate-50">
                                            {[1, 2, 3, 4, 5].map(lv => (
                                                <button key={lv} onClick={() => setDifficulty(lv)} className={`flex-1 py-4 rounded-2xl font-black text-sm transition-all ${difficulty === lv ? 'bg-blue-600 text-white shadow-xl scale-110' : 'text-slate-400 hover:text-slate-600'}`}>{lv}</button>
                                            ))}
                                        </div>
                                    </section>
                                    <section>
                                        <h4 className="text-[12px] font-black text-slate-400 uppercase mb-4 px-3 flex items-center gap-3"><Icon name="list" size={16} className="text-purple-400" /> 3. 문제수</h4>
                                        <div className="flex bg-slate-100 p-2 rounded-[2rem] justify-between gap-1.5 shadow-inner border-2 border-slate-50">
                                            {[5, 10, 15].map(cnt => (
                                                <button key={cnt} onClick={() => setQuestionCount(cnt)} className={`flex-1 py-4 rounded-2xl font-black text-sm transition-all ${questionCount === cnt ? 'bg-teal-500 text-white shadow-xl scale-110' : 'text-slate-400 hover:text-slate-600'}`}>{cnt}</button>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>

                            <button onClick={generateQuiz} disabled={!selectedUnit || loading} className={`w-full py-8 rounded-[3.5rem] font-black text-2xl shadow-2xl transition-all relative z-10 ${loading ? 'bg-slate-100 text-slate-300' : 'blue-gradient text-white active:scale-95 shadow-blue-100'}`}>
                                {loading ? 'AI 선생님 출제 중...' : '공부 시작할까요? ✨'}
                            </button>
                        </div>
                    </main>
                </div>
            );

            if (view === 'quiz') {
                const q = currentQuestions[currentQuestionIndex];
                if (!q) return null;
                return (
                    <div className="h-screen flex flex-col bg-white overflow-hidden text-left font-sans">
                        {/* 진행바 최적화 */}
                        <div className="h-1.5 w-full bg-slate-50 shrink-0">
                            <div className="h-full blue-gradient transition-all duration-700 rounded-r-full" style={{ width: `${((currentQuestionIndex + 1) / currentQuestions.length) * 100}%` }}></div>
                        </div>
                        <header className="px-6 py-4 flex items-center justify-between border-b border-blue-50 bg-white shrink-0">
                            <button onClick={() => setView('student_setup')} className="text-slate-300 p-2 active:scale-90"><Icon name="x" size={24}/></button>
                            <div className="flex flex-col items-center">
                                <span className="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mb-0.5">SWEET STUDY</span>
                                <span className="font-black text-slate-800 text-xl leading-none italic">{currentQuestionIndex + 1} <span className="text-slate-200 not-italic mx-0.5">/</span> {currentQuestions.length}</span>
                            </div>
                            <div className="px-3 py-1.5 bg-blue-500 text-white rounded-xl text-[10px] font-black shadow-lg animate-pulse">{Math.floor((Date.now() - startTime)/1000)}s</div>
                        </header>
                        
                        {/* [수정 사항] 스크롤 최소화 및 왼쪽 정렬 레이아웃 */}
                        <main className="flex-1 p-6 flex flex-col items-center justify-center soft-bg-gradient overflow-y-auto">
                            <div className="w-full max-w-xl flex flex-col">
                                <div className="mb-6"><span className="px-4 py-1.5 bg-blue-50 text-blue-500 text-[10px] font-black rounded-full border border-blue-100 shadow-sm flex items-center gap-2 w-fit"><Icon name="search" size={12}/> 문제를 잘 읽어보세요</span></div>
                                <h2 className="text-xl md:text-2xl font-black text-slate-700 text-left leading-snug mb-10 px-2 tracking-tight whitespace-pre-wrap">{q.question}</h2>
                                <div className="space-y-3 w-full">
                                    {q.options.map((opt, i) => (
                                        <button key={i} onClick={() => setAnswers({...answers, [currentQuestionIndex]: i})} className={`w-full text-left px-7 py-5 rounded-[2.5rem] border-2 transition-all flex items-center gap-5 group relative overflow-hidden active:scale-[0.98] ${answers[currentQuestionIndex] === i ? 'border-blue-400 bg-blue-50 text-blue-700 shadow-lg' : 'border-slate-100 bg-white hover:border-blue-100 shadow-sm'}`}>
                                            <div className={`w-10 h-10 rounded-2xl flex items-center justify-center text-sm font-black shrink-0 transition-all ${answers[currentQuestionIndex] === i ? 'bg-blue-600 text-white rotate-[360deg]' : 'bg-slate-100 text-slate-400'}`}>{i + 1}</div>
                                            <span className="font-bold text-base md:text-lg leading-tight opacity-90">{opt}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </main>

                        <footer className="p-6 border-t border-slate-50 bg-white shrink-0 shadow-sm">
                            <div className="max-w-xl mx-auto flex gap-4">
                                <button disabled={currentQuestionIndex === 0} onClick={() => setCurrentQuestionIndex(p => p - 1)} className="flex-1 py-5 bg-slate-50 text-slate-400 font-black rounded-3xl text-sm transition-all active:scale-95 disabled:opacity-30 text-center">이전</button>
                                {currentQuestionIndex === currentQuestions.length - 1 ? 
                                    <button onClick={() => { const s = currentQuestions.filter((q, i) => answers[i] === q.correctAnswer).length; setQuizResults({ score: s, total: currentQuestions.length, percentage: Math.round((s/currentQuestions.length)*100) }); setView('result'); }} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2.5] blue-gradient text-white py-5 rounded-[2.2rem] font-black text-lg shadow-xl active:scale-95 transition-all text-center">최종 결과 확인 ✨</button> :
                                    <button onClick={() => setCurrentQuestionIndex(p => p + 1)} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2.5] bg-slate-800 text-white py-5 rounded-[2.2rem] font-black text-lg active:scale-95 shadow-xl transition-all text-center">다음 문제 🍬</button>
                                }
                            </div>
                        </footer>
                    </div>
                );
            }

            if (view === 'result') {
                const getAchievement = (pct) => {
                    if (pct >= 100) return { icon: 'crown', text: '완벽한 마스터!', color: 'text-yellow-400' };
                    if (pct >= 80) return { icon: 'trophy', text: '대단한 성취예요!', color: 'text-blue-500' };
                    if (pct >= 60) return { icon: 'medal', text: '정말 잘했어요!', color: 'text-teal-500' };
                    if (pct >= 40) return { icon: 'thumbs-up', text: '조금만 더 힘내요!', color: 'text-orange-400' };
                    return { icon: 'star', text: '함께 복습해볼까요?', color: 'text-rose-400' };
                };
                const ach = getAchievement(quizResults?.percentage);

                return (
                    <div className="min-h-screen bg-blue-50 flex flex-col items-center">
                        <Header />
                        <main className="w-full max-w-2xl p-6 md:p-8 space-y-10 animate-fadeIn pb-32">
                            {/* [수정 사항] 결과 요약창 콤팩트화 */}
                            <div className="bg-white rounded-[4rem] shadow-2xl border-8 border-white overflow-hidden relative">
                                <div className="result-header-gradient p-12 text-white text-center flex flex-col items-center relative overflow-hidden">
                                    <div className={`w-24 h-24 rounded-[2rem] bg-white flex items-center justify-center mb-6 shadow-2xl animate-float ${ach.color}`}><Icon name={ach.icon} size={50} fill="currentColor" /></div>
                                    <h2 className="text-[11px] font-black uppercase tracking-[0.4em] opacity-80 mb-2 leading-none text-center">{ach.text}</h2>
                                    <div className="text-8xl font-black mb-4 tracking-tighter drop-shadow-2xl text-center leading-none">{quizResults?.percentage}%</div>
                                    <div className="inline-flex items-center gap-3 px-8 py-2 bg-white/20 rounded-full text-[10px] font-black uppercase tracking-widest backdrop-blur-md border border-white/30">{quizResults?.score} / {quizResults?.total} Correct ✨</div>
                                </div>

                                {/* [수정 사항] 1열 와이드 배치 및 풍성한 해설 */}
                                <div className="p-8 md:p-12 space-y-10 bg-white">
                                    <h4 className="text-[12px] font-black text-blue-500 uppercase tracking-[0.4em] flex items-center gap-4 px-2 underline underline-offset-8 decoration-4 decoration-blue-50"><Icon name="search-check" size={18}/> 오답 가이드 및 상세 해설</h4>
                                    <div className="space-y-8">
                                        {currentQuestions.map((q, i) => (
                                            <div key={i} className={`p-8 rounded-[3.5rem] border-4 transition-all flex flex-col relative overflow-hidden group ${answers[i] === q.correctAnswer ? 'bg-emerald-50/40 border-emerald-100 shadow-sm' : 'bg-rose-50/40 border-rose-100 shadow-md'}`}>
                                                <div className="flex justify-between items-start mb-8 relative z-10">
                                                    <h5 className="font-black text-lg md:text-xl text-slate-700 leading-snug pr-8 text-left">{i+1}. {q.question}</h5>
                                                    <div className={`p-3 rounded-2xl text-white shadow-lg ${answers[i] === q.correctAnswer ? 'bg-emerald-400' : 'bg-rose-400'}`}>
                                                        <Icon name={answers[i] === q.correctAnswer ? 'check' : 'x'} size={24} />
                                                    </div>
                                                </div>
                                                
                                                <div className="bg-white/90 p-7 rounded-[2.5rem] border-2 border-white shadow-inner relative z-10">
                                                    <div className="flex items-center gap-2.5 mb-3">
                                                        <div className="bg-blue-600 w-1.5 h-5 rounded-full"></div>
                                                        <span className="text-blue-600 uppercase font-black text-[10px] tracking-widest leading-none">선생님의 상세 하트 해설</span>
                                                    </div>
                                                    <p className="text-sm md:text-[15px] font-bold text-slate-500 leading-relaxed text-left italic opacity-95">{q.explanation}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-col md:flex-row gap-5 max-w-lg mx-auto w-full pb-20">
                                <button onClick={() => setView('student_setup')} className="flex-1 py-7 bg-white border-4 border-blue-100 rounded-[3rem] font-black text-blue-500 shadow-2xl transition-all text-lg active:scale-95 text-center">새로운 단원 공부 🍬</button>
                                <button onClick={() => setView('landing')} className="flex-1 py-7 bg-slate-800 text-white rounded-[3rem] font-black shadow-2xl transition-all text-lg active:scale-95 hover:bg-slate-900 text-center">메인으로 가기 ✨</button>
                            </div>
                        </main>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
