<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduQuiz AI Blue v11.0 Ultra Stability</title>

    <!-- 필수 라이브러리 (안정적인 CDN 사용) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .blue-gradient { background: linear-gradient(135deg, #1d4ed8 0%, #0d9488 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slideUp { animation: slideUp 0.6s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 🧠 AI & GitHub 핵심 설정 (Firebase 로직 0% - 완전 배제) ---
        const geminiApiKey = "AIzaSyALNeGgRQZz1Z1D1aNW_RX0ZHHg1_pPtlM";
        const GITHUB_REPO = "haha1590/nursing-study"; 

        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [view, setView] = useState('landing');
            const [status, setStatus] = useState(null);
            const [units, setUnits] = useState([]); 
            const [loading, setLoading] = useState(false);
            const [selectedUnit, setSelectedUnit] = useState(null);
            const [currentQuestions, setCurrentQuestions] = useState([]);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [quizResults, setQuizResults] = useState(null);
            const [startTime, setStartTime] = useState(null);

            useEffect(() => {
                fetchGithubFiles();
            }, []);

            const fetchGithubFiles = async () => {
                try {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/`);
                    const data = await response.json();
                    const htmlFiles = data
                        .filter(file => file.name.endsWith('.html') && file.name !== 'index.html')
                        .map(file => ({
                            id: file.sha,
                            title: file.name.replace('.html', ''),
                            path: file.path,
                            rawUrl: `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${file.path}`
                        }));
                    setUnits(htmlFiles);
                } catch (err) {
                    setStatus({ type: 'error', text: "자료 목록을 읽어오지 못했습니다. 새로고침 해주세요." });
                }
            };

            // [Ultra Logic] 성공할 때까지 주소와 모델을 자동으로 스위칭하는 자가 복구 엔진
            const masterAICall = async (prompt) => {
                const configs = [
                    { ver: 'v1beta', mod: 'gemini-1.5-flash' },
                    { ver: 'v1', mod: 'gemini-1.5-flash' },
                    { ver: 'v1beta', mod: 'gemini-pro' }
                ];

                let lastError = "";
                for (let i = 0; i < configs.length; i++) {
                    const { ver, mod } = configs[i];
                    try {
                        const url = `https://generativelanguage.googleapis.com/${ver}/models/${mod}:generateContent?key=${geminiApiKey}`;
                        const res = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await res.json();
                        if (res.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                            return data.candidates[0].content.parts[0].text;
                        }
                        lastError = data.error?.message || "Server response error";
                    } catch (e) {
                        lastError = e.message;
                    }
                }
                throw new Error(lastError);
            };

            const generateQuiz = async () => {
                if (!selectedUnit) return;
                
                setLoading(true);
                setStatus({ type: 'info', text: "AI가 단원 내용을 분석하여 퀴즈를 만들고 있습니다..." });
                await new Promise(r => setTimeout(r, 100)); // UI 렌더링 보장

                try {
                    // 1. 깃허브 원문 로드 및 정제
                    let textResponse = await fetch(selectedUnit.rawUrl);
                    if (!textResponse.ok) textResponse = await fetch(selectedUnit.rawUrl.replace('/main/', '/master/'));
                    const rawHTML = await textResponse.text();
                    
                    const doc = new DOMParser().parseFromString(rawHTML, 'text/html');
                    const cleanText = (doc.body.textContent || "").replace(/\s+/g, ' ').trim().substring(0, 8000);

                    // 2. 통합 프롬프트 구성
                    const finalPrompt = `보건간호과 선생님 모드로 응답하세요. 제공된 자료로 5지선다형 퀴즈 5개를 만드세요. 반드시 순수한 JSON 배열로만 출력하세요.
                    형식: [{"id":1,"question":"질문","options":["1","2","3","4","5"],"correctAnswer":0,"explanation":"해설"}]
                    
[자료내용]
${cleanText}`;

                    // 3. 자가 복구 엔진 호출
                    const aiResult = await masterAICall(finalPrompt);

                    // 4. 데이터 파싱
                    const jsonStart = aiResult.indexOf('[');
                    const jsonEnd = aiResult.lastIndexOf(']') + 1;
                    if (jsonStart === -1) throw new Error("JSON 추출 실패");
                    
                    const questions = JSON.parse(aiResult.substring(jsonStart, jsonEnd));
                    setCurrentQuestions(questions);
                    setCurrentQuestionIndex(0); 
                    setAnswers({}); 
                    setView('quiz'); 
                    setStartTime(Date.now()); 
                    setStatus(null);
                } catch (err) { 
                    console.error("Master Engine Error:", err);
                    setStatus({ type: 'error', text: "서버 응답이 늦어지고 있습니다. 잠시 후 다시 한번 눌러주세요." }); 
                } finally { setLoading(false); }
            };

            const Header = () => (
                <header className="bg-white/80 backdrop-blur-md border-b border-slate-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shrink-0 shadow-sm">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setView('landing'); setStatus(null); }}>
                        <div className="bg-blue-700 p-2 rounded-2xl text-white shadow-lg shadow-blue-100"><Icon name="shield-check" size={20} /></div>
                        <h1 className="text-lg font-black text-blue-900 tracking-tighter italic">EduQuiz <span className="text-teal-600 not-italic uppercase text-[10px]">v11.0 Ultra</span></h1>
                    </div>
                    {status && (
                        <div className={`fixed top-20 left-1/2 -translate-x-1/2 w-[90%] max-w-xs px-6 py-4 rounded-3xl shadow-2xl font-bold text-[10px] z-[200] animate-bounce border-2 ${status.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-600' : 'bg-blue-50 border-blue-200 text-blue-600'}`}>
                            <div className="flex gap-3 items-center">
                                <Icon name={status.type === 'error' ? 'alert-circle' : 'loader'} size={18} className="shrink-0" />
                                <span className="leading-relaxed">{status.text}</span>
                            </div>
                            <button onClick={() => setStatus(null)} className="absolute top-2 right-3 opacity-30 text-lg">×</button>
                        </div>
                    )}
                </header>
            );

            if (view === 'landing') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-slate-50">
                    <div className="bg-white p-12 rounded-[5rem] shadow-2xl border-8 border-white w-full max-w-sm relative overflow-hidden animate-slideUp">
                        <div className="bg-blue-700 w-24 h-24 rounded-[3rem] flex items-center justify-center mx-auto mb-10 text-white shadow-2xl shadow-blue-100">
                            <Icon name="zap" size={48} fill="currentColor" />
                        </div>
                        <h2 className="text-4xl font-black mb-4 text-slate-800 leading-tight tracking-tighter">간호의 기초<br/><span className="bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-teal-600">Ultra AI 퀴즈</span></h2>
                        <p className="text-slate-400 font-bold mb-14 text-[10px] tracking-[0.3em] uppercase italic opacity-70 leading-none">Hyper-Stability v11.0 ✨</p>
                        <button onClick={() => setView('student_setup')} className="w-full blue-gradient p-7 rounded-[2.5rem] text-white font-black flex items-center justify-center gap-4 transition-all shadow-xl shadow-blue-200 active:scale-95">
                            <Icon name="play" fill="currentColor" size={20} /> 학습 시작하기
                        </button>
                    </div>
                </div>
            );

            if (view === 'student_setup') return (
                <div className="min-h-screen flex flex-col items-center bg-slate-50">
                    <Header />
                    <main className="max-w-xl w-full p-6 space-y-10 animate-slideUp">
                        <div className="bg-white rounded-[4rem] p-10 shadow-2xl border-8 border-white space-y-8 text-center">
                            <h2 className="text-3xl font-black text-slate-700 italic tracking-tighter leading-none">Unit Library ✨</h2>
                            <section className="text-left space-y-4">
                                <h4 className="text-[12px] font-black text-blue-700 uppercase tracking-widest flex items-center gap-2 px-1"><Icon name="layers" size={16} /> 학습할 단원을 선택하세요</h4>
                                <div className="grid gap-2 max-h-80 overflow-y-auto custom-scrollbar pr-1">
                                    {units.length === 0 ? (
                                        <div className="text-center py-20 text-slate-300 font-bold italic">자료를 불러오는 중입니다...</div>
                                    ) : units.map(u => (
                                        <button key={u.id} onClick={() => setSelectedUnit(u)} className={`text-left px-7 py-6 rounded-[2.5rem] border-4 transition-all font-bold flex items-center justify-between group ${selectedUnit?.id === u.id ? 'border-blue-700 bg-blue-50 text-blue-900 shadow-lg' : 'border-slate-50 bg-slate-50/50 hover:border-blue-100 shadow-sm'}`}>
                                            <span className="text-[15px]">{u.title}</span>
                                            {selectedUnit?.id === u.id && <Icon name="check-circle-2" className="text-blue-700" size={20}/>}
                                        </button>
                                    ))}
                                </div>
                            </section>
                            <button onClick={generateQuiz} disabled={!selectedUnit || loading} className={`w-full py-8 rounded-[2.8rem] font-black text-xl shadow-2xl transition-all ${loading ? 'bg-slate-100 text-slate-300' : 'blue-gradient text-white active:scale-95 shadow-blue-200'}`}>
                                {loading ? '분석 중...' : '퀴즈 생성 & 시작 ✨'}
                            </button>
                        </div>
                    </main>
                </div>
            );

            if (view === 'quiz') {
                const q = currentQuestions[currentQuestionIndex];
                if (!q) return null;
                return (
                    <div className="h-screen flex flex-col bg-white overflow-hidden text-left animate-slideUp">
                        <header className="px-6 py-5 flex items-center justify-between border-b border-slate-100 shrink-0">
                            <button onClick={() => setView('student_setup')} className="text-slate-300 p-2"><Icon name="x" size={28}/></button>
                            <span className="font-black text-blue-700 text-lg tracking-widest italic">{currentQuestionIndex + 1} / {currentQuestions.length}</span>
                            <div className="px-4 py-1.5 bg-slate-800 text-white rounded-full text-[10px] font-black tracking-widest">{Math.floor((Date.now() - startTime)/1000)}S</div>
                        </header>
                        <main className="flex-1 p-8 flex flex-col items-center justify-center space-y-12 overflow-y-auto">
                            <h2 className="text-2xl font-black text-slate-700 text-center leading-snug max-w-lg">{q.question}</h2>
                            <div className="w-full max-w-lg space-y-4">
                                {q.options.map((opt, i) => (
                                    <button key={i} onClick={() => setAnswers({...answers, [currentQuestionIndex]: i})} className={`w-full text-left p-7 rounded-[2.8rem] border-4 transition-all font-black text-lg flex items-center gap-6 ${answers[currentQuestionIndex] === i ? 'border-blue-700 bg-blue-50 text-blue-900 shadow-md' : 'border-slate-50 bg-slate-50 hover:border-blue-100 shadow-sm'}`}>
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center shrink-0 ${answers[currentQuestionIndex] === i ? 'bg-blue-700 text-white shadow-md' : 'bg-slate-800 text-white'}`}>{i + 1}</div>
                                        <span className="leading-tight">{opt}</span>
                                    </button>
                                ))}
                            </div>
                        </main>
                        <footer className="p-8 border-t border-slate-100 bg-white shrink-0 text-center flex flex-col items-center">
                            <div className="max-w-lg w-full flex gap-4">
                                <button disabled={currentQuestionIndex === 0} onClick={() => setCurrentQuestionIndex(p => p - 1)} className="flex-1 py-6 bg-slate-50 text-slate-300 font-black rounded-3xl text-sm">이전</button>
                                {currentQuestionIndex === currentQuestions.length - 1 ? 
                                    <button onClick={() => { const s = currentQuestions.filter((q, i) => answers[i] === q.correctAnswer).length; setQuizResults({ score: s, total: currentQuestions.length, percentage: Math.round((s/currentQuestions.length)*100) }); setView('result'); }} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2] blue-gradient text-white py-6 rounded-3xl font-black text-xl shadow-lg active:scale-95">결과 제출</button> :
                                    <button onClick={() => setCurrentQuestionIndex(p => p + 1)} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2] bg-slate-800 text-white py-6 rounded-3xl font-black text-xl active:scale-95">다음 문제</button>
                                }
                            </div>
                        </footer>
                    </div>
                );
            }

            if (view === 'result') return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center text-center">
                    <Header />
                    <main className="w-full max-w-md p-6 space-y-6 overflow-y-auto pb-24 text-center flex flex-col items-center animate-slideUp">
                        <div className="bg-white rounded-[5rem] shadow-2xl p-12 text-center border-8 border-white w-full">
                            <div className="bg-yellow-400 w-24 h-24 rounded-[3rem] flex items-center justify-center mx-auto mb-8 text-white shadow-xl shadow-yellow-100 animate-bounce"><Icon name="award" size={50} /></div>
                            <h2 className="text-8xl font-black mb-3 text-slate-800 tracking-tighter text-center">{quizResults?.percentage}%</h2>
                            <p className="font-black text-blue-700 text-xl mb-12 text-center tracking-tighter">참 잘했어요! ✨</p>
                            <div className="space-y-6 text-left mb-12 border-t border-slate-100 pt-10">
                                {currentQuestions.map((q, i) => (
                                    <div key={i} className={`p-8 rounded-[3rem] border-2 ${answers[i] === q.correctAnswer ? 'border-emerald-100 bg-emerald-50/20' : 'border-rose-100 bg-rose-50/20'}`}>
                                        <p className="font-black text-slate-700 mb-4 leading-snug">{i+1}. {q.question}</p>
                                        <p className="text-[11px] text-slate-400 leading-relaxed italic border-t border-white/50 pt-3 mt-3">{q.explanation}</p>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setView('landing')} className="w-full bg-slate-800 text-white py-7 rounded-[2.5rem] font-black text-xl shadow-xl active:scale-95 text-center">메인으로</button>
                        </div>
                    </main>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
