<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduQuiz AI Blue v29.0 Sweet Mastery</title>

    <!-- 필수 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f9ff; -webkit-tap-highlight-color: transparent; color: #1e293b; }
        .blue-gradient { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .lovely-gradient { background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%); }
        .master-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 10px; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const GITHUB_REPO = "haha1590/nursing-study"; 
        const { useState, useEffect, useCallback, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [geminiApiKey, setGeminiApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [view, setView] = useState('landing');
            const [status, setStatus] = useState(null); 
            const [units, setUnits] = useState([]); 
            const [loading, setLoading] = useState(false);
            const [selectedUnit, setSelectedUnit] = useState(null);
            const [difficulty, setDifficulty] = useState(3);
            const [questionCount, setQuestionCount] = useState(5);
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);

            const [currentQuestions, setCurrentQuestions] = useState([]);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [quizResults, setQuizResults] = useState(null);
            const [startTime, setStartTime] = useState(null);

            // [안정성 유지] 깃허브 파일 로딩 - 닫는 괄호 및 배열 확인 완료
            const fetchGithubFiles = useCallback(async () => {
                try {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/`);
                    const data = await response.json();
                    if (!response.ok) throw new Error("자료 목록 로딩 실패");
                    const htmlFiles = data
                        .filter(file => file.name.endsWith('.html') && file.name !== 'index.html')
                        .map(file => ({
                            id: file.sha,
                            title: file.name.replace('.html', ''),
                            path: file.path,
                            rawUrl: `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${file.path}`
                        }));
                    setUnits(htmlFiles);
                } catch (err) {
                    setStatus({ type: 'error', text: "저장소 연결 실패" });
                }
            }, []); 

            useEffect(() => { fetchGithubFiles(); }, [fetchGithubFiles]);

            const masterAICall = async (prompt) => {
                if (!geminiApiKey) throw new Error("API 키가 없습니다.");
                const configs = [
                    { ver: 'v1beta', mod: 'gemini-2.5-flash' },      
                    { ver: 'v1beta', mod: 'gemini-2.0-flash' },      
                    { ver: 'v1beta', mod: 'gemini-2.0-flash-lite' }  
                ];
                let lastErrorMessage = "";
                for (const cfg of configs) {
                    try {
                        const url = `https://generativelanguage.googleapis.com/${cfg.ver}/models/${cfg.mod}:generateContent?key=${geminiApiKey}`;
                        const res = await fetch(url, {
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await res.json();
                        if (res.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                            return data.candidates[0].content.parts[0].text;
                        }
                        lastErrorMessage = data.error?.message || "AI 엔진 응답 오류";
                    } catch (err) { lastErrorMessage = err.message; }
                    await new Promise(r => setTimeout(r, 150));
                }
                throw new Error(lastErrorMessage);
            };

            const generateQuiz = async () => {
                if (!selectedUnit) return;
                setLoading(true);
                setStatus({ type: 'info', text: "AI 선생님이 당신을 위한 문제를 만들고 있어요! ✨" });
                try {
                    let textResponse = await fetch(selectedUnit.rawUrl);
                    if (!textResponse.ok) textResponse = await fetch(selectedUnit.rawUrl.replace('/main/', '/master/'));
                    const rawHTML = await textResponse.text();
                    const doc = new DOMParser().parseFromString(rawHTML, 'text/html');
                    const cleanText = (doc.body.textContent || "").replace(/\s+/g, ' ').trim().substring(0, 7000);

                    const finalPrompt = `보건간호과 선생님 모드. [자료내용]을 분석하여 난이도 ${difficulty}/5단계의 5지선다형 문제를 ${questionCount}개 만드세요.
                    학생들이 반복 학습할 수 있도록 매번 다른 핵심 개념을 찾아 중복되지 않는 문제를 생성하세요. (ID: ${Date.now()})
                    반드시 순수한 JSON 배열로만 출력하세요. 형식: [{"id":1,"question":"질문","options":["1","2","3","4","5"],"correctAnswer":0,"explanation":"해설"}]
                    [자료내용] ${cleanText}`;

                    const aiResult = await masterAICall(finalPrompt);
                    const startIdx = aiResult.indexOf('[');
                    const endIdx = aiResult.lastIndexOf(']') + 1;
                    if (startIdx === -1) throw new Error("JSON 분석 실패");
                    
                    setCurrentQuestions(JSON.parse(aiResult.substring(startIdx, endIdx)));
                    // [인덱스 초기화] 0으로 리셋 확인 완료
                    setCurrentQuestionIndex(0); 
                    setAnswers({}); 
                    setView('quiz'); 
                    setStartTime(Date.now()); 
                    setStatus(null);
                } catch (err) { setStatus({ type: 'error', text: `AI 실패: ${err.message}` }); }
                finally { setLoading(false); }
            };

            const Header = () => (
                <header className="bg-white/90 backdrop-blur-md border-b border-blue-50 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shrink-0 shadow-sm">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setView('landing'); setStatus(null); }}>
                        <div className="bg-blue-600 p-2 rounded-2xl text-white shadow-lg"><Icon name="heart" size={20} fill="currentColor" /></div>
                        <h1 className="text-lg font-black text-blue-900 tracking-tighter leading-none italic">EduQuiz <span className="text-teal-400 not-italic uppercase text-[10px]">v29.0 Sweet</span></h1>
                    </div>
                    {/* [안정성 유지] status null 체크 래퍼 */}
                    {status && (
                        <div className={`fixed top-20 left-1/2 -translate-x-1/2 w-[90%] max-w-xs px-6 py-4 rounded-3xl shadow-2xl font-bold text-[10px] z-[200] animate-bounce border-2 ${status.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-600' : 'bg-blue-50 border-blue-200 text-blue-600'}`}>
                            <div className="flex gap-3 items-center text-left">
                                <Icon name={status.type === 'error' ? 'alert-circle' : 'loader-2'} size={18} className={status.type !== 'error' ? 'animate-spin' : ''} />
                                <span className="leading-relaxed text-left">{status.text}</span>
                            </div>
                            <button onClick={() => setStatus(null)} className="absolute top-2 right-3 opacity-30 text-lg">×</button>
                        </div>
                    )}
                </header>
            );

            if (!geminiApiKey || view === 'settings') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-blue-50">
                    <div className="bg-white p-10 rounded-[4rem] shadow-2xl w-full max-w-sm space-y-6 animate-fadeIn text-center border-8 border-white">
                        <div className="bg-blue-600 w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto text-white shadow-xl"><Icon name="lock" size={40} /></div>
                        <h2 className="text-2xl font-black text-slate-800 tracking-tight">AI 보안 금고</h2>
                        <p className="text-sm text-slate-400 font-bold leading-relaxed italic">우리 반만의 비밀 열쇠를<br/>입력해 주세요.</p>
                        <input type="password" placeholder="Gemini API Key 입력" className="w-full px-6 py-5 rounded-3xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-blue-500 font-mono text-xs shadow-inner" onBlur={(e) => { const key = e.target.value.trim(); if(key) { setGeminiApiKey(key); localStorage.setItem('gemini_api_key', key); setView('landing'); } }} />
                        <div className="bg-pink-50 p-5 rounded-3xl text-[11px] text-pink-500 font-bold leading-tight border border-pink-100 italic">⚠️ 선생님! 깃허브 소스코드에는 키를 절대 적지 마세요. 여기 화면에만 입력하면 안전하게 보호됩니다.</div>
                    </div>
                </div>
            );

            if (view === 'landing') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-50 overflow-hidden font-sans">
                    <div className="relative w-full max-w-sm flex flex-col items-center">
                        <div className="absolute -top-20 bg-blue-200 w-72 h-72 rounded-full blur-[100px] opacity-40 animate-pulse"></div>
                        <div className="bg-white p-14 rounded-[6rem] shadow-2xl w-full text-center relative glass-card animate-fadeIn flex flex-col items-center border-8 border-white">
                            <div className="bg-blue-600 w-28 h-28 rounded-[3.5rem] flex items-center justify-center mb-12 text-white shadow-2xl shadow-blue-200 animate-float"><Icon name="smile" size={60} fill="currentColor" /></div>
                            <h2 className="text-5xl font-black mb-6 text-slate-800 tracking-tighter leading-tight">간호의 기초<br/><span className="bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-teal-500 drop-shadow-sm">달콤 퀴즈</span></h2>
                            <p className="text-slate-400 font-bold mb-16 text-[11px] tracking-[0.4em] uppercase italic opacity-70">Sweet Mastery v29.0 🍬</p>
                            <button onClick={() => setView('student_setup')} className="w-full blue-gradient p-8 rounded-[3.5rem] text-white font-black flex items-center justify-center gap-4 transition-all shadow-xl shadow-blue-200 active:scale-95 text-xl">
                                <Icon name="zap" fill="currentColor" size={28} /> 학습 시작하기
                            </button>
                            <button onClick={() => setView('settings')} className="mt-10 text-slate-300 text-[11px] font-bold underline underline-offset-4 opacity-50">API 키 재설정</button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'student_setup') return (
                <div className="min-h-screen flex flex-col items-center bg-blue-50">
                    <Header />
                    <main className="max-w-xl w-full p-6 space-y-6 animate-fadeIn">
                        <div className="bg-white rounded-[5rem] p-10 md:p-14 shadow-2xl border-8 border-white space-y-12 flex flex-col items-center relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-full blur-3xl -mr-16 -mt-16"></div>
                            <div className="text-center relative z-10"><h2 className="text-4xl font-black text-slate-800 tracking-tighter italic mb-3">Study Setup ✨</h2><p className="text-[12px] font-bold text-blue-500 uppercase tracking-[0.3em]">나만의 달콤한 공부 계획 🍬</p></div>
                            
                            <div className="w-full space-y-8 relative z-10">
                                <section className="relative">
                                    <h4 className="text-[12px] font-black text-slate-400 uppercase mb-4 px-3 flex items-center gap-3"><Icon name="bookmark" size={16} fill="currentColor" className="text-blue-400" /> 1. 어떤 단원을 공부할까요?</h4>
                                    <div className="relative">
                                        <button onClick={() => setIsDropdownOpen(!isDropdownOpen)} className="w-full bg-slate-50 px-8 py-6 rounded-3xl border-4 border-slate-50 flex items-center justify-between font-black text-slate-700 shadow-inner transition-all hover:border-blue-100 active:scale-95">
                                            <span className="truncate pr-4">{selectedUnit ? selectedUnit.title : '단원을 선택해 주세요'}</span>
                                            <Icon name={isDropdownOpen ? 'chevron-up' : 'chevron-down'} size={24} className="text-blue-500 shrink-0" />
                                        </button>
                                        {isDropdownOpen && (
                                            <div className="absolute top-full left-0 right-0 mt-3 bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl border-4 border-blue-50 z-[100] max-h-56 overflow-y-auto custom-scrollbar animate-fadeIn">
                                                {units.map(u => (
                                                    <button key={u.id} onClick={() => { setSelectedUnit(u); setIsDropdownOpen(false); }} className={`w-full text-left px-8 py-5 font-black text-[15px] border-b border-slate-50 last:border-0 transition-colors flex items-center justify-between ${selectedUnit?.id === u.id ? 'text-blue-600 bg-blue-50' : 'text-slate-500 hover:bg-slate-50'}`}>
                                                        <span>{u.title}</span>
                                                        {selectedUnit?.id === u.id && <Icon name="check" size={18} />}
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </section>

                                <div className="grid grid-cols-2 gap-8">
                                    <section>
                                        <h4 className="text-[12px] font-black text-slate-400 uppercase mb-4 px-3 flex items-center gap-3"><Icon name="bar-chart-2" size={16} className="text-teal-400" /> 2. 난이도</h4>
                                        <div className="flex bg-slate-100 p-2 rounded-[2rem] justify-between gap-1.5 shadow-inner">
                                            {[1, 2, 3, 4, 5].map(lv => (
                                                <button key={lv} onClick={() => setDifficulty(lv)} className={`flex-1 py-4 rounded-2xl font-black text-sm transition-all ${difficulty === lv ? 'bg-blue-600 text-white shadow-xl scale-110' : 'text-slate-400 hover:text-slate-600'}`}>{lv}</button>
                                            ))}
                                        </div>
                                    </section>
                                    <section>
                                        <h4 className="text-[12px] font-black text-slate-400 uppercase mb-4 px-3 flex items-center gap-3"><Icon name="list" size={16} className="text-purple-400" /> 3. 문제수</h4>
                                        <div className="flex bg-slate-100 p-2 rounded-[2rem] justify-between gap-1.5 shadow-inner">
                                            {[5, 10, 15].map(cnt => (
                                                <button key={cnt} onClick={() => setQuestionCount(cnt)} className={`flex-1 py-4 rounded-2xl font-black text-sm transition-all ${questionCount === cnt ? 'bg-teal-500 text-white shadow-xl scale-110' : 'text-slate-400 hover:text-slate-600'}`}>{cnt}</button>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>

                            <button onClick={generateQuiz} disabled={!selectedUnit || loading} className={`w-full py-8 rounded-[3.5rem] font-black text-2xl shadow-2xl transition-all relative z-10 ${loading ? 'bg-slate-100 text-slate-300' : 'blue-gradient text-white active:scale-95 shadow-blue-100'}`}>
                                {loading ? 'AI 선생님 출제 중...' : '퀴즈 시작할까요? ✨'}
                            </button>
                        </div>
                    </main>
                </div>
            );

            if (view === 'quiz') {
                const q = currentQuestions[currentQuestionIndex];
                if (!q) return null;
                return (
                    <div className="h-screen flex flex-col bg-white overflow-hidden text-left font-sans">
                        <div className="h-2 w-full bg-slate-50 relative shrink-0">
                            <div className="h-full blue-gradient transition-all duration-700 rounded-r-full shadow-lg" style={{ width: `${((currentQuestionIndex + 1) / currentQuestions.length) * 100}%` }}></div>
                        </div>
                        <header className="px-6 py-5 flex items-center justify-between border-b border-blue-50 bg-white/80 backdrop-blur-md shrink-0">
                            <button onClick={() => setView('student_setup')} className="text-slate-300 p-2 hover:text-rose-400 transition-colors"><Icon name="x" size={28}/></button>
                            <div className="flex flex-col items-center">
                                <span className="text-[11px] font-black text-blue-400 uppercase tracking-[0.3em] mb-1 leading-none">Sweet Study</span>
                                <span className="font-black text-slate-800 text-2xl leading-none italic">{currentQuestionIndex + 1} <span className="text-slate-200 not-italic mx-1">/</span> {currentQuestions.length}</span>
                            </div>
                            <div className="px-4 py-2 bg-blue-500 text-white rounded-2xl text-[11px] font-black shadow-lg shadow-blue-100 animate-pulse flex items-center gap-2"><Icon name="clock" size={14}/>{Math.floor((Date.now() - startTime)/1000)}s</div>
                        </header>
                        <main className="flex-1 p-8 md:p-14 flex flex-col items-center justify-start overflow-y-auto lovely-gradient">
                            <div className="w-full max-w-2xl space-y-12">
                                <h2 className="text-2xl md:text-3xl font-black text-slate-700 text-center leading-snug px-6 drop-shadow-sm min-h-[6rem] flex items-center justify-center font-sans tracking-tight">{q.question}</h2>
                                <div className="space-y-4 w-full">
                                    {q.options.map((opt, i) => (
                                        <button key={i} onClick={() => setAnswers({...answers, [currentQuestionIndex]: i})} className={`w-full text-left px-8 py-6 rounded-[2.8rem] border-4 transition-all flex items-center gap-6 group relative overflow-hidden active:scale-[0.98] ${answers[currentQuestionIndex] === i ? 'border-blue-400 bg-blue-50 text-blue-700 shadow-xl scale-[1.03]' : 'border-white bg-white hover:border-blue-100 shadow-md'}`}>
                                            <div className={`w-12 h-12 rounded-[1.2rem] flex items-center justify-center text-xl font-black shrink-0 transition-all ${answers[currentQuestionIndex] === i ? 'bg-blue-600 text-white rotate-[360deg]' : 'bg-slate-100 text-slate-400'}`}>{i + 1}</div>
                                            <span className="font-black text-lg md:text-xl leading-tight opacity-90">{opt}</span>
                                            {answers[currentQuestionIndex] === i && <div className="absolute right-8 top-1/2 -translate-y-1/2 text-blue-200/40 animate-pulse"><Icon name="sparkles" size={48} /></div>}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </main>
                        <footer className="p-8 border-t border-slate-50 bg-white shrink-0 shadow-[0_-20px_50px_rgba(0,0,0,0.02)]">
                            <div className="max-w-2xl mx-auto flex gap-5">
                                <button disabled={currentQuestionIndex === 0} onClick={() => setCurrentQuestionIndex(p => p - 1)} className="flex-1 py-6 bg-slate-50 text-slate-400 font-black rounded-3xl text-sm uppercase tracking-widest transition-all hover:bg-slate-100 disabled:opacity-30">이전 문제</button>
                                {currentQuestionIndex === currentQuestions.length - 1 ? 
                                    <button onClick={() => { const s = currentQuestions.filter((q, i) => answers[i] === q.correctAnswer).length; setQuizResults({ score: s, total: currentQuestions.length, percentage: Math.round((s/currentQuestions.length)*100) }); setView('result'); }} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2.5] blue-gradient text-white py-6 rounded-[2.5rem] font-black text-xl shadow-xl shadow-blue-100 active:scale-95 transition-all">공부 마칠까요? 🍬</button> :
                                    <button onClick={() => setCurrentQuestionIndex(p => p + 1)} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2.5] bg-slate-800 text-white py-6 rounded-[2.5rem] font-black text-xl active:scale-95 shadow-2xl transition-all hover:bg-slate-900">다음 문제 ✨</button>
                                }
                            </div>
                        </footer>
                    </div>
                );
            }

            if (view === 'result') {
                const getAchievement = (pct) => {
                    if (pct >= 100) return { icon: 'crown', text: '완벽한 마스터!', color: 'text-yellow-400', bg: 'bg-yellow-100' };
                    if (pct >= 80) return { icon: 'trophy', text: '대단한 성취네요!', color: 'text-blue-500', bg: 'bg-blue-100' };
                    if (pct >= 40) return { icon: 'thumbs-up', text: '조금만 더 힘내요!', color: 'text-teal-500', bg: 'bg-teal-100' };
                    return { icon: 'star', text: '복습이 필요해요!', color: 'text-rose-400', bg: 'bg-rose-100' };
                };
                const ach = getAchievement(quizResults?.percentage);

                return (
                    <div className="min-h-screen bg-blue-50 flex flex-col items-center overflow-x-hidden">
                        <Header />
                        <main className="w-full max-w-3xl p-6 md:p-10 space-y-12 animate-fadeIn pb-32">
                            {/* 결과 상단 카드 */}
                            <div className="bg-white rounded-[5rem] shadow-2xl border-8 border-white overflow-hidden">
                                <div className="master-gradient p-16 text-white text-center flex flex-col items-center relative overflow-hidden">
                                    <div className={`w-28 h-28 rounded-[2.5rem] bg-white flex items-center justify-center mb-8 shadow-2xl animate-float ${ach.color}`}><Icon name={ach.icon} size={60} fill="currentColor" /></div>
                                    <h2 className="text-sm font-black uppercase tracking-[0.5em] opacity-80 mb-3 leading-none text-center">{ach.text}</h2>
                                    <div className="text-[10rem] font-black mb-6 tracking-tighter drop-shadow-2xl text-center leading-none select-none">{quizResults?.percentage}%</div>
                                    <div className="inline-flex items-center gap-4 px-10 py-3 bg-white/20 rounded-full text-xs font-black uppercase tracking-widest backdrop-blur-md border border-white/30 shadow-lg">{quizResults?.score} / {quizResults?.total} Correct ✨</div>
                                    <div className="absolute top-0 right-0 w-96 h-96 bg-white/10 rounded-full blur-[100px] -mr-48 -mt-48"></div>
                                </div>

                                {/* [수정 확인] 1열 배치 및 풍성한 해설 가이드 */}
                                <div className="p-10 md:p-16 space-y-12 bg-white">
                                    <h4 className="text-[13px] font-black text-blue-500 uppercase tracking-[0.4em] flex items-center gap-4 px-4 underline underline-offset-[16px] decoration-[16px] decoration-blue-50"><Icon name="search-check" size={20}/> 정답 확인 및 상세 해설 가이드</h4>
                                    <div className="space-y-10">
                                        {currentQuestions.map((q, i) => (
                                            <div key={i} className={`p-10 rounded-[4rem] border-4 transition-all flex flex-col relative overflow-hidden group ${answers[i] === q.correctAnswer ? 'bg-emerald-50/40 border-emerald-100 shadow-sm' : 'bg-rose-50/40 border-rose-100 shadow-md'}`}>
                                                <div className="flex justify-between items-start mb-10 relative z-10">
                                                    <h5 className="font-black text-xl md:text-2xl text-slate-700 leading-snug pr-12 text-left">{i+1}. {q.question}</h5>
                                                    <div className={`p-4 rounded-3xl text-white shadow-xl group-hover:scale-110 transition-transform ${answers[i] === q.correctAnswer ? 'bg-emerald-400' : 'bg-rose-400'}`}>
                                                        <Icon name={answers[i] === q.correctAnswer ? 'check' : 'x'} size={32} />
                                                    </div>
                                                </div>
                                                
                                                <div className="bg-white/80 p-8 rounded-[3rem] border-2 border-white/50 shadow-inner relative z-10">
                                                    <div className="flex items-center gap-3 mb-4">
                                                        <div className="bg-blue-600 w-2 h-6 rounded-full"></div>
                                                        <span className="text-blue-600 uppercase font-black text-[11px] tracking-widest">선생님의 핵심 포인트</span>
                                                    </div>
                                                    <p className="text-[15px] md:text-base font-bold text-slate-500 leading-relaxed text-left font-sans italic opacity-90">{q.explanation}</p>
                                                </div>
                                                <div className="absolute -bottom-8 -left-8 opacity-[0.03] rotate-12 group-hover:rotate-0 transition-transform"><Icon name="smile" size={150} /></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-col md:flex-row gap-6 max-w-2xl mx-auto w-full pb-20">
                                <button onClick={() => setView('student_setup')} className="flex-1 py-8 bg-white border-4 border-blue-100 rounded-[3rem] font-black text-blue-500 shadow-2xl hover:shadow-blue-200 transition-all text-xl active:scale-95">새로운 학습 시작 🍬</button>
                                <button onClick={() => setView('landing')} className="flex-1 py-8 bg-slate-800 text-white rounded-[3rem] font-black shadow-2xl transition-all text-xl active:scale-95 hover:bg-slate-900">처음으로 가기 ✨</button>
                            </div>
                        </main>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
