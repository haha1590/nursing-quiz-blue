<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduQuiz AI Blue v28.0 Aesthetic Mastery</title>

    <!-- 필수 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f7ff; -webkit-tap-highlight-color: transparent; color: #1e293b; }
        .blue-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%); }
        .pink-soft-gradient { background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-bounce-subtle { animation: bounce-subtle 2s ease-in-out infinite; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const GITHUB_REPO = "haha1590/nursing-study"; 
        const { useState, useEffect, useCallback, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [geminiApiKey, setGeminiApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [view, setView] = useState('landing');
            const [status, setStatus] = useState(null); 
            const [units, setUnits] = useState([]); 
            const [loading, setLoading] = useState(false);
            const [selectedUnit, setSelectedUnit] = useState(null);
            const [difficulty, setDifficulty] = useState(3);
            const [questionCount, setQuestionCount] = useState(5);
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);

            const [currentQuestions, setCurrentQuestions] = useState([]);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [quizResults, setQuizResults] = useState(null);
            const [startTime, setStartTime] = useState(null);

            const fetchGithubFiles = useCallback(async () => {
                try {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/`);
                    const data = await response.json();
                    if (!response.ok) throw new Error("자료 목록 로딩 실패");
                    const htmlFiles = data
                        .filter(file => file.name.endsWith('.html') && file.name !== 'index.html')
                        .map(file => ({
                            id: file.sha,
                            title: file.name.replace('.html', ''),
                            path: file.path,
                            rawUrl: `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${file.path}`
                        }));
                    setUnits(htmlFiles);
                } catch (err) {
                    setStatus({ type: 'error', text: "저장소 연결 실패" });
                }
            }, []); 

            useEffect(() => { fetchGithubFiles(); }, [fetchGithubFiles]);

            const masterAICall = async (prompt) => {
                if (!geminiApiKey) throw new Error("API 키가 없습니다.");
                const configs = [
                    { ver: 'v1beta', mod: 'gemini-2.5-flash' },      
                    { ver: 'v1beta', mod: 'gemini-2.0-flash' },      
                    { ver: 'v1beta', mod: 'gemini-2.0-flash-lite' }  
                ];
                let lastErrorMessage = "";
                for (const cfg of configs) {
                    try {
                        const url = `https://generativelanguage.googleapis.com/${cfg.ver}/models/${cfg.mod}:generateContent?key=${geminiApiKey}`;
                        const res = await fetch(url, {
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await res.json();
                        if (res.ok && data.candidates?.[0]?.content?.parts?.[0]?.text) {
                            return data.candidates[0].content.parts[0].text;
                        }
                        lastErrorMessage = data.error?.message || "AI 엔진 응답 오류";
                    } catch (err) { lastErrorMessage = err.message; }
                    await new Promise(r => setTimeout(r, 150));
                }
                throw new Error(lastErrorMessage);
            };

            const generateQuiz = async () => {
                if (!selectedUnit) return;
                setLoading(true);
                setStatus({ type: 'info', text: "AI 선생님이 문제를 설계하고 있습니다..." });
                try {
                    let textResponse = await fetch(selectedUnit.rawUrl);
                    if (!textResponse.ok) textResponse = await fetch(selectedUnit.rawUrl.replace('/main/', '/master/'));
                    const rawHTML = await textResponse.text();
                    const doc = new DOMParser().parseFromString(rawHTML, 'text/html');
                    const cleanText = (doc.body.textContent || "").replace(/\s+/g, ' ').trim().substring(0, 7000);

                    const finalPrompt = `보건간호과 선생님 모드. [자료내용]을 분석하여 난이도 ${difficulty}/5단계의 5지선다형 문제를 ${questionCount}개 만드세요.
                    매번 다른 핵심 개념을 찾아 중복되지 않는 문제를 생성하세요. (ID: ${Date.now()})
                    순수한 JSON 배열로만 출력하세요. 형식: [{"id":1,"question":"질문","options":["1","2","3","4","5"],"correctAnswer":0,"explanation":"해설"}]
                    [자료내용] ${cleanText}`;

                    const aiResult = await masterAICall(finalPrompt);
                    const startIdx = aiResult.indexOf('[');
                    const endIdx = aiResult.lastIndexOf(']') + 1;
                    if (startIdx === -1) throw new Error("JSON 분석 실패");
                    
                    setCurrentQuestions(JSON.parse(aiResult.substring(startIdx, endIdx)));
                    setCurrentQuestionIndex(0); 
                    setAnswers({}); 
                    setView('quiz'); 
                    setStartTime(Date.now()); 
                    setStatus(null);
                } catch (err) { setStatus({ type: 'error', text: `AI 실패: ${err.message}` }); }
                finally { setLoading(false); }
            };

            const Header = () => (
                <header className="bg-white/90 backdrop-blur-md border-b border-blue-100 px-6 py-3 flex justify-between items-center sticky top-0 z-50 shrink-0 shadow-sm">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setView('landing'); setStatus(null); }}>
                        <div className="bg-blue-600 p-1.5 rounded-xl text-white shadow-lg shadow-blue-100"><Icon name="graduation-cap" size={18} /></div>
                        <h1 className="text-base font-black text-blue-900 tracking-tighter leading-none italic">EduQuiz <span className="text-teal-500 not-italic uppercase text-[9px]">v28.0 Mastery</span></h1>
                    </div>
                    {status && (
                        <div className={`fixed top-16 left-1/2 -translate-x-1/2 w-[90%] max-w-xs px-5 py-3 rounded-2xl shadow-xl font-bold text-[10px] z-[200] animate-bounce border-2 ${status.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-600' : 'bg-blue-50 border-blue-200 text-blue-600'}`}>
                            <div className="flex gap-2 items-center text-left">
                                <Icon name={status.type === 'error' ? 'alert-circle' : 'loader-2'} size={14} className={status.type !== 'error' ? 'animate-spin' : ''} />
                                <span className="leading-relaxed">{status.text}</span>
                            </div>
                            <button onClick={() => setStatus(null)} className="absolute top-1.5 right-2 opacity-30">×</button>
                        </div>
                    )}
                </header>
            );

            if (!geminiApiKey || view === 'settings') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-blue-50">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm space-y-6 animate-fadeIn text-center border-4 border-white">
                        <div className="bg-blue-600 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto text-white shadow-xl"><Icon name="key" size={32} /></div>
                        <h2 className="text-xl font-black text-slate-800">AI 보안 연결</h2>
                        <p className="text-xs text-slate-400 font-bold leading-relaxed italic">발급받은 Gemini API 키를 입력해 주세요.</p>
                        <input type="password" placeholder="API Key 입력" className="w-full px-6 py-4 rounded-2xl bg-slate-50 border-2 border-slate-100 outline-none focus:border-blue-500 font-mono text-xs shadow-inner" onBlur={(e) => { const key = e.target.value.trim(); if(key) { setGeminiApiKey(key); localStorage.setItem('gemini_api_key', key); setView('landing'); } }} />
                        <div className="bg-blue-50 p-4 rounded-2xl text-[10px] text-blue-600 font-bold leading-tight">입력한 키는 암호화되어 선생님의 기기에만 저장됩니다.</div>
                    </div>
                </div>
            );

            if (view === 'landing') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-50 overflow-hidden">
                    <div className="relative w-full max-w-sm flex flex-col items-center">
                        <div className="absolute -top-20 bg-blue-200 w-64 h-64 rounded-full blur-[100px] opacity-30"></div>
                        <div className="bg-white p-12 rounded-[5rem] shadow-2xl w-full text-center relative glass-card animate-fadeIn flex flex-col items-center">
                            <div className="bg-blue-600 w-24 h-24 rounded-[2.5rem] flex items-center justify-center mb-10 text-white shadow-2xl shadow-blue-200 animate-bounce-subtle"><Icon name="sparkles" size={48} fill="currentColor" /></div>
                            <h2 className="text-5xl font-black mb-4 text-slate-800 tracking-tighter leading-tight">간호의 기초<br/><span className="bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-teal-500">AI 퀴즈</span></h2>
                            <p className="text-slate-400 font-bold mb-14 text-[10px] tracking-[0.4em] uppercase italic opacity-60">Interactive Mastery v28.0</p>
                            <button onClick={() => setView('student_setup')} className="w-full blue-gradient p-7 rounded-[2.5rem] text-white font-black flex items-center justify-center gap-4 transition-all shadow-xl shadow-blue-200 active:scale-95 text-lg">
                                <Icon name="play" fill="currentColor" size={24} /> 학습 시작하기
                            </button>
                            <button onClick={() => setView('settings')} className="mt-8 text-slate-300 text-[10px] font-bold underline">API 키 재설정</button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'student_setup') return (
                <div className="min-h-screen flex flex-col items-center bg-blue-50">
                    <Header />
                    <main className="max-w-xl w-full p-6 space-y-6 animate-fadeIn">
                        <div className="bg-white rounded-[4rem] p-8 md:p-12 shadow-2xl border-4 border-white space-y-10 flex flex-col items-center">
                            <div className="text-center"><h2 className="text-3xl font-black text-slate-800 tracking-tighter italic mb-2">Study Setup ✨</h2><p className="text-[11px] font-bold text-blue-400 uppercase tracking-widest">나만의 맞춤형 퀴즈를 구성해 보세요</p></div>
                            
                            <div className="w-full space-y-6">
                                <section className="relative">
                                    <h4 className="text-[11px] font-black text-slate-400 uppercase mb-3 px-2 flex items-center gap-2"><Icon name="book" size={14} /> 1. 학습 단원</h4>
                                    <div className="relative">
                                        <button onClick={() => setIsDropdownOpen(!isDropdownOpen)} className="w-full bg-slate-50 px-6 py-5 rounded-2xl border-2 border-slate-100 flex items-center justify-between font-bold text-slate-700 shadow-sm transition-all hover:border-blue-200 active:scale-95">
                                            <span>{selectedUnit ? selectedUnit.title : '단원을 선택해 주세요'}</span>
                                            <Icon name={isDropdownOpen ? 'chevron-up' : 'chevron-down'} size={20} className="text-blue-500" />
                                        </button>
                                        {isDropdownOpen && (
                                            <div className="absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl shadow-2xl border-2 border-blue-50 z-[100] max-h-48 overflow-y-auto custom-scrollbar animate-fadeIn">
                                                {units.map(u => (
                                                    <button key={u.id} onClick={() => { setSelectedUnit(u); setIsDropdownOpen(false); }} className={`w-full text-left px-6 py-4 font-bold text-sm border-b border-slate-50 last:border-0 hover:bg-blue-50 transition-colors ${selectedUnit?.id === u.id ? 'text-blue-600 bg-blue-50' : 'text-slate-500'}`}>{u.title}</button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </section>

                                <div className="grid grid-cols-2 gap-6">
                                    <section>
                                        <h4 className="text-[11px] font-black text-slate-400 uppercase mb-3 px-2 flex items-center gap-2"><Icon name="bar-chart-2" size={14} /> 2. 난이도</h4>
                                        <div className="flex bg-slate-50 p-1.5 rounded-2xl border-2 border-slate-100 justify-between gap-1">
                                            {[1, 2, 3, 4, 5].map(lv => (
                                                <button key={lv} onClick={() => setDifficulty(lv)} className={`flex-1 py-3 rounded-xl font-black text-[12px] transition-all ${difficulty === lv ? 'bg-blue-600 text-white shadow-md scale-105' : 'text-slate-300 hover:text-slate-500'}`}>{lv}</button>
                                            ))}
                                        </div>
                                    </section>
                                    <section>
                                        <h4 className="text-[11px] font-black text-slate-400 uppercase mb-3 px-2 flex items-center gap-2"><Icon name="layers" size={14} /> 3. 문항 수</h4>
                                        <div className="flex bg-slate-50 p-1.5 rounded-2xl border-2 border-slate-100 justify-between gap-1">
                                            {[5, 10, 15].map(cnt => (
                                                <button key={cnt} onClick={() => setQuestionCount(cnt)} className={`flex-1 py-3 rounded-xl font-black text-[12px] transition-all ${questionCount === cnt ? 'bg-teal-500 text-white shadow-md scale-105' : 'text-slate-300 hover:text-slate-500'}`}>{cnt}</button>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>

                            <button onClick={generateQuiz} disabled={!selectedUnit || loading} className={`w-full py-7 rounded-[2.5rem] font-black text-xl shadow-2xl transition-all ${loading ? 'bg-slate-100 text-slate-300' : 'blue-gradient text-white active:scale-95 shadow-blue-100 mt-4'}`}>
                                {loading ? 'AI 분석 중...' : '퀴즈 생성 & 시작 ✨'}
                            </button>
                        </div>
                    </main>
                </div>
            );

            if (view === 'quiz') {
                const q = currentQuestions[currentQuestionIndex];
                if (!q) return null;
                return (
                    <div className="h-screen flex flex-col bg-white overflow-hidden text-left font-sans">
                        <header className="px-6 py-4 flex items-center justify-between border-b border-blue-50 bg-white/50 backdrop-blur-md shrink-0">
                            <button onClick={() => setView('student_setup')} className="text-slate-300 p-2"><Icon name="x" size={24}/></button>
                            <div className="flex flex-col items-center">
                                <span className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-0.5">Question</span>
                                <span className="font-black text-slate-700 text-lg leading-none italic">{currentQuestionIndex + 1} <span className="text-slate-300 not-italic">/</span> {currentQuestions.length}</span>
                            </div>
                            <div className="px-3 py-1.5 bg-blue-500 text-white rounded-xl text-[10px] font-black shadow-lg shadow-blue-100">{Math.floor((Date.now() - startTime)/1000)}s</div>
                        </header>
                        <main className="flex-1 p-6 md:p-10 flex flex-col items-center justify-start overflow-y-auto pink-soft-gradient">
                            <div className="w-full max-w-lg space-y-10">
                                <h2 className="text-xl md:text-2xl font-black text-slate-700 text-center leading-snug px-4 drop-shadow-sm min-h-[4rem] flex items-center justify-center">{q.question}</h2>
                                <div className="space-y-3 w-full">
                                    {q.options.map((opt, i) => (
                                        <button key={i} onClick={() => setAnswers({...answers, [currentQuestionIndex]: i})} className={`w-full text-left px-7 py-5 rounded-[2rem] border-4 transition-all flex items-center gap-5 group relative overflow-hidden active:scale-98 ${answers[currentQuestionIndex] === i ? 'border-blue-400 bg-blue-50 text-blue-700 shadow-lg scale-[1.02]' : 'border-white bg-white hover:border-blue-50 shadow-sm'}`}>
                                            <div className={`w-10 h-10 rounded-2xl flex items-center justify-center text-sm font-black shrink-0 transition-all ${answers[currentQuestionIndex] === i ? 'bg-blue-600 text-white rotate-[360deg]' : 'bg-slate-700 text-white'}`}>{i + 1}</div>
                                            <span className="font-bold text-base md:text-lg leading-tight opacity-90">{opt}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </main>
                        <footer className="p-6 border-t border-slate-100 bg-white shrink-0">
                            <div className="max-w-lg mx-auto flex gap-4">
                                <button disabled={currentQuestionIndex === 0} onClick={() => setCurrentQuestionIndex(p => p - 1)} className="flex-1 py-5 bg-slate-50 text-slate-300 font-black rounded-2xl text-xs uppercase tracking-widest transition-all hover:bg-slate-100">이전</button>
                                {currentQuestionIndex === currentQuestions.length - 1 ? 
                                    <button onClick={() => { const s = currentQuestions.filter((q, i) => answers[i] === q.correctAnswer).length; setQuizResults({ score: s, total: currentQuestions.length, percentage: Math.round((s/currentQuestions.length)*100) }); setView('result'); }} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2] blue-gradient text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-100 active:scale-95 transition-all">결과 제출 ✨</button> :
                                    <button onClick={() => setCurrentQuestionIndex(p => p + 1)} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2] bg-slate-800 text-white py-5 rounded-2xl font-black text-lg active:scale-95 shadow-xl transition-all">다음 문제</button>
                                }
                            </div>
                        </footer>
                    </div>
                );
            }

            if (view === 'result') return (
                <div className="min-h-screen bg-blue-50 flex flex-col items-center">
                    <Header />
                    <main className="w-full max-w-4xl p-6 md:p-10 space-y-10 animate-fadeIn">
                        {/* 결과 요약 카드 (상단) */}
                        <div className="bg-white rounded-[4rem] shadow-2xl border-8 border-white overflow-hidden relative">
                            <div className="blue-gradient p-12 text-white text-center flex flex-col items-center relative overflow-hidden">
                                <div className="bg-yellow-300 w-20 h-20 rounded-[1.5rem] flex items-center justify-center mb-6 shadow-2xl animate-bounce text-white"><Icon name="award" size={40} fill="currentColor" /></div>
                                <h2 className="text-sm font-black uppercase tracking-[0.5em] opacity-80 mb-2 leading-none text-center">Final Score</h2>
                                <div className="text-8xl font-black mb-4 tracking-tighter drop-shadow-2xl text-center leading-none">{quizResults?.percentage}%</div>
                                <div className="inline-flex items-center gap-3 px-8 py-2.5 bg-white/20 rounded-full text-xs font-black uppercase tracking-widest backdrop-blur-md border border-white/30">{quizResults?.score} / {quizResults?.total} Correct! ✨</div>
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-[80px] -mr-32 -mt-32"></div>
                            </div>

                            {/* 가로 폭을 넓게 활용하는 오답 카드 그리드 */}
                            <div className="p-8 md:p-12 space-y-8 bg-white">
                                <h4 className="text-[12px] font-black text-blue-500 uppercase tracking-[0.3em] flex items-center gap-3 px-2"><Icon name="search" size={16}/> 퀴즈 오답 및 해설 가이드</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {currentQuestions.map((q, i) => (
                                        <div key={i} className={`p-8 rounded-[3rem] border-2 transition-all flex flex-col ${answers[i] === q.correctAnswer ? 'bg-emerald-50/30 border-emerald-100' : 'bg-rose-50/30 border-rose-100'}`}>
                                            <div className="flex justify-between items-start mb-6">
                                                <h5 className="font-black text-lg text-slate-700 leading-tight pr-6">{i+1}. {q.question}</h5>
                                                {answers[i] === q.correctAnswer ? <div className="text-emerald-500 shrink-0"><Icon name="check-circle" size={28}/></div> : <div className="text-rose-500 shrink-0"><Icon name="x-circle" size={28}/></div>}
                                            </div>
                                            <div className="mt-auto bg-white/70 p-6 rounded-3xl border border-blue-50/50 shadow-inner">
                                                <span className="text-blue-500 block mb-2 uppercase font-black text-[9px] tracking-widest underline underline-offset-4 decoration-2 decoration-blue-100">선생님의 핵심 포인트</span>
                                                <p className="text-sm font-bold text-slate-500 leading-relaxed text-left">{q.explanation}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col md:flex-row gap-4 max-w-lg mx-auto w-full pb-20">
                            <button onClick={() => setView('student_setup')} className="flex-1 py-7 bg-white border-4 border-blue-100 rounded-[2.5rem] font-black text-blue-500 shadow-xl hover:shadow-blue-200 transition-all text-lg active:scale-95">새로운 학습 시작</button>
                            <button onClick={() => setView('landing')} className="flex-1 py-7 bg-slate-800 text-white rounded-[2.5rem] font-black shadow-2xl transition-all text-lg active:scale-95">처음으로 돌아가기</button>
                        </div>
                    </main>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
