<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduQuiz AI Blue GitHub v4.6 Real Final</title>

    <!-- 필수 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f9ff; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 10px; }
        .blue-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- Firebase Config (인증용) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBuKO5Iia70QyrgrXGgRqJsLChHhHMFREg",
            authDomain: "edu-quiz-lovely.firebaseapp.com",
            projectId: "edu-quiz-lovely",
            storageBucket: "edu-quiz-lovely.firebasestorage.app",
            messagingSenderId: "889544643228",
            appId: "1:889544643228:web:cbd9a57b3bbe2c61231359"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // --- 🧠 AI & GitHub 설정 ---
        const geminiApiKey = "AIzaSyALNeGgRQZz1Z1D1aNW_RX0ZHHg1_pPtlM";
        const MODEL_NAME = "gemini-1.5-flash"; 
        const GITHUB_REPO = "haha1590/nursing-study"; 

        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('landing');
            const [status, setStatus] = useState(null);
            const [units, setUnits] = useState([]); 
            const [loading, setLoading] = useState(false);
            const [selectedUnit, setSelectedUnit] = useState(null);
            const [currentQuestions, setCurrentQuestions] = useState([]);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [quizResults, setQuizResults] = useState(null);
            const [startTime, setStartTime] = useState(null);

            useEffect(() => {
                signInAnonymously(auth).catch(() => setUser({uid: 'guest'}));
                onAuthStateChanged(auth, setUser);
                fetchGithubFiles();
            }, []);

            const fetchGithubFiles = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/`);
                    if (!response.ok) throw new Error("GitHub 연결 실패");
                    const data = await response.json();
                    
                    const htmlFiles = data
                        .filter(file => file.name.endsWith('.html') && file.name !== 'index.html')
                        .map(file => ({
                            id: file.sha,
                            title: file.name.replace('.html', ''),
                            path: file.path,
                            rawUrl: `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${file.path}`
                        }));
                    setUnits(htmlFiles);
                } catch (err) {
                    setStatus({ type: 'error', text: "자료 목록 로딩 실패" });
                } finally { setLoading(false); }
            };

            const generateQuiz = async () => {
                if (!selectedUnit) return;
                setLoading(true);
                setStatus({ type: 'info', text: "AI가 문제를 생성하고 있습니다..." });
                
                try {
                    // 1. 깃허브 원문 읽기
                    let textResponse = await fetch(selectedUnit.rawUrl);
                    if (!textResponse.ok) {
                        const altUrl = selectedUnit.rawUrl.replace('/main/', '/master/');
                        textResponse = await fetch(altUrl);
                    }
                    if (!textResponse.ok) throw new Error("자료 파일을 읽을 수 없습니다.");
                    const rawContent = await textResponse.text();

                    // 2. [초기 성공 로직 복원] 가장 단순한 대화형 프롬프트
                    const finalPrompt = `당신은 보건간호과 선생님입니다. 
제공된 학습 자료를 분석하여 학생들을 위한 5지선다형 퀴즈 5개를 만드세요.
반드시 다른 설명 없이 아래의 JSON 배열 형식으로만 응답하세요.

[학습 자료 내용]
${rawContent.substring(0, 15000)}

[JSON 응답 형식]
[{"id":1,"question":"질문내용","options":["보기1","보기2","보기3","보기4","보기5"],"correctAnswer":0,"explanation":"정답해설"}]`;

                    // 3. [에러 방지를 위한 최적의 엔드포인트] v1beta + 단일 contents
                    const apiURL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${geminiApiKey}`;
                    
                    const aiResponse = await fetch(apiURL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ 
                                parts: [{ text: finalPrompt }] 
                            }] 
                        })
                    });
                    
                    const resultData = await aiResponse.json();
                    
                    if (!aiResponse.ok) {
                        throw new Error(resultData.error?.message || "AI 서버 통신 오류");
                    }

                    const rawText = resultData.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!rawText) throw new Error("응답이 비어있습니다.");

                    // [철벽 JSON 필터] 대괄호 사이의 데이터만 쏙 골라냄
                    const jsonMatch = rawText.match(/\[.*\]/s);
                    const cleanJson = jsonMatch ? jsonMatch[0] : rawText.replace(/```json/gi, "").replace(/```/gi, "").trim();
                    
                    setCurrentQuestions(JSON.parse(cleanJson));
                    setCurrentQuestionIndex(0); 
                    setAnswers({}); 
                    setView('quiz'); 
                    setStartTime(Date.now()); 
                    setStatus(null);
                } catch (err) { 
                    console.error("AI Error Details:", err);
                    setStatus({ type: 'error', text: `AI 오류: 다시 한 번 클릭해 주세요.` }); 
                } finally { setLoading(false); }
            };

            const Header = () => (
                <header className="bg-white/90 backdrop-blur-md border-b border-blue-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shrink-0 shadow-sm">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setView('landing'); setStatus(null); }}>
                        <div className="bg-blue-500 p-2 rounded-2xl text-white shadow-lg"><Icon name="github" size={20} /></div>
                        <h1 className="text-lg font-black text-blue-600 tracking-tighter leading-none italic">EduQuiz <span className="text-teal-400 not-italic uppercase text-[10px]">Blue v4.6</span></h1>
                    </div>
                    {status && (
                        <div className={`fixed top-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl font-bold text-[10px] z-[200] animate-bounce border-2 ${status.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-500' : 'bg-blue-50 border-blue-200 text-blue-500'}`}>
                            {status.text}
                            <button onClick={() => setStatus(null)} className="ml-2 font-black opacity-30">×</button>
                        </div>
                    )}
                </header>
            );

            if (view === 'landing') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                    <div className="bg-white p-12 rounded-[5rem] shadow-2xl border-8 border-blue-50 w-full max-w-sm relative overflow-hidden">
                        <div className="bg-blue-500 w-20 h-20 rounded-[2.5rem] flex items-center justify-center mx-auto mb-10 text-white shadow-xl shadow-blue-100 animate-pulse">
                            <Icon name="award" size={40} fill="currentColor" />
                        </div>
                        <h2 className="text-4xl font-black mb-4 text-slate-800 leading-tight tracking-tighter">간호의 기초<br/><span className="bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-teal-400">GitHub AI 퀴즈</span></h2>
                        <p className="text-slate-400 font-bold mb-14 text-[10px] tracking-[0.3em] uppercase italic opacity-70 leading-none">Real Final v4.6 ✨</p>
                        <button onClick={() => setView('student_setup')} className="w-full blue-gradient p-7 rounded-[2.5rem] text-white font-black flex items-center justify-center gap-4 transition-all shadow-xl shadow-blue-100 active:scale-95">
                            <Icon name="play" fill="currentColor" /> 학습 시작하기
                        </button>
                    </div>
                </div>
            );

            if (view === 'student_setup') return (
                <div className="min-h-screen flex flex-col items-center">
                    <Header />
                    <main className="max-w-xl w-full p-6 space-y-10">
                        <div className="bg-white rounded-[4rem] p-10 shadow-2xl border-8 border-white space-y-8">
                            <h2 className="text-3xl font-black text-slate-700 italic tracking-tighter text-center">GitHub Study ✨</h2>
                            <section className="text-left space-y-4">
                                <h4 className="text-[12px] font-black text-blue-500 uppercase tracking-widest flex items-center gap-2"><Icon name="list" size={16} /> 학습할 단원을 선택하세요</h4>
                                <div className="grid gap-2 max-h-80 overflow-y-auto custom-scrollbar pr-1">
                                    {units.length === 0 ? (
                                        <div className="text-center py-20 text-slate-300 font-bold italic">자료를 불러오는 중입니다...</div>
                                    ) : units.map(u => (
                                        <button key={u.id} onClick={() => setSelectedUnit(u)} className={`text-left px-6 py-5 rounded-[2.2rem] border-4 transition-all font-bold flex items-center justify-between group ${selectedUnit?.id === u.id ? 'border-blue-300 bg-blue-50 text-blue-600 shadow-lg' : 'border-slate-50 bg-slate-50/50 hover:border-blue-100 shadow-sm'}`}>
                                            <span>{u.title}</span>
                                            {selectedUnit?.id === u.id && <Icon name="check" className="text-blue-500" size={18}/>}
                                        </button>
                                    ))}
                                </div>
                            </section>
                            <button onClick={generateQuiz} disabled={!selectedUnit || loading} className={`w-full py-7 rounded-[2.5rem] font-black text-xl shadow-2xl transition-all ${loading ? 'bg-slate-100 text-slate-300' : 'blue-gradient text-white active:scale-95 shadow-blue-100'}`}>
                                {loading ? 'AI 분석 중...' : '퀴즈 생성 & 시작 ✨'}
                            </button>
                        </div>
                    </main>
                </div>
            );

            if (view === 'quiz') {
                const q = currentQuestions[currentQuestionIndex];
                if (!q) return null;
                return (
                    <div className="h-screen flex flex-col bg-white overflow-hidden text-left">
                        <header className="px-6 py-5 flex items-center justify-between border-b border-blue-50 shrink-0">
                            <button onClick={() => setView('student_setup')} className="text-slate-300"><Icon name="x" size={28}/></button>
                            <span className="font-black text-blue-500 text-lg">{currentQuestionIndex + 1} / {currentQuestions.length}</span>
                            <div className="px-3 py-1 bg-blue-500 text-white rounded-xl text-xs font-bold">{Math.floor((Date.now() - startTime)/1000)}s</div>
                        </header>
                        <main className="flex-1 p-8 flex flex-col items-center justify-center space-y-10 overflow-y-auto">
                            <h2 className="text-2xl font-black text-slate-700 text-center leading-snug max-w-lg">{q.question}</h2>
                            <div className="w-full max-w-lg space-y-4">
                                {q.options.map((opt, i) => (
                                    <button key={i} onClick={() => setAnswers({...answers, [currentQuestionIndex]: i})} className={`w-full text-left p-6 rounded-[2.5rem] border-4 transition-all font-bold text-lg flex items-center gap-5 ${answers[currentQuestionIndex] === i ? 'border-blue-400 bg-pink-50 text-blue-600 shadow-md' : 'border-slate-50 bg-slate-50 hover:border-blue-100 shadow-sm'}`}>
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black shrink-0 ${answers[currentQuestionIndex] === i ? 'bg-blue-500 text-white' : 'bg-slate-700 text-white'}`}>{i + 1}</div>
                                        <span>{opt}</span>
                                    </button>
                                ))}
                            </div>
                        </main>
                        <footer className="p-8 border-t border-blue-50 bg-white shrink-0 text-center flex flex-col items-center">
                            <div className="max-w-lg w-full flex gap-4 text-center">
                                <button disabled={currentQuestionIndex === 0} onClick={() => setCurrentQuestionIndex(p => p - 1)} className="flex-1 py-5 bg-slate-50 text-slate-300 font-black text-sm uppercase rounded-2xl">이전</button>
                                {currentQuestionIndex === currentQuestions.length - 1 ? 
                                    <button onClick={() => { const s = currentQuestions.filter((q, i) => answers[i] === q.correctAnswer).length; setQuizResults({ score: s, total: currentQuestions.length, percentage: Math.round((s/currentQuestions.length)*100) }); setView('result'); }} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2] blue-gradient text-white py-5 rounded-[2rem] font-black text-xl shadow-lg active:scale-95 text-center">결과 확인</button> :
                                    <button onClick={() => setCurrentQuestionIndex(p => p + 1)} disabled={answers[currentQuestionIndex] === undefined} className="flex-[2] bg-slate-800 text-white py-5 rounded-[2rem] font-black text-xl active:scale-95 text-center">다음 문제</button>
                                }
                            </div>
                        </footer>
                    </div>
                );
            }

            if (view === 'result') return (
                <div className="min-h-screen bg-blue-50 flex flex-col items-center text-center">
                    <Header />
                    <main className="w-full max-w-md p-6 space-y-6 overflow-y-auto pb-24 text-center">
                        <div className="bg-white rounded-[4rem] shadow-2xl p-10 text-center border-8 border-white">
                            <div className="bg-yellow-300 w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto mb-8 text-white shadow-xl animate-bounce text-center shadow-yellow-100"><Icon name="star" size={50} fill="currentColor" /></div>
                            <h2 className="text-7xl font-black mb-2 text-slate-800 tracking-tighter text-center">{quizResults?.percentage}%</h2>
                            <p className="font-black text-blue-500 text-xl mb-10 text-center">{quizResults?.score} / {quizResults?.total} 맞힘!</p>
                            <div className="space-y-6 text-left mb-10 border-t border-blue-50 pt-8 text-left">
                                {currentQuestions.map((q, i) => (
                                    <div key={i} className={`p-6 rounded-3xl border-2 ${answers[i] === q.correctAnswer ? 'border-emerald-100 bg-emerald-50/30' : 'border-rose-100 bg-rose-50/30'}`}>
                                        <p className="font-bold text-slate-700 mb-2 leading-tight text-left">{i+1}. {q.question}</p>
                                        <p className="text-xs text-slate-400 leading-relaxed italic border-t border-white/50 pt-2 mt-2 text-left">{q.explanation}</p>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setView('landing')} className="w-full bg-slate-800 text-white py-6 rounded-[2rem] font-black text-xl shadow-xl active:scale-95 text-center">메인으로</button>
                        </div>
                    </main>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
